<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Dodger HRs">
  <meta name="theme-color" content="#000000">
  <title>Dodger Home Runs 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      background: #000;
      color: #fff;
      font-family: 'Bricolage Grotesque', -apple-system, 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    #app {
      min-height: 100vh;
      min-height: -webkit-fill-available;
      padding-top: max(env(safe-area-inset-top), 20px);
      padding-left: max(env(safe-area-inset-left), 24px);
      padding-right: max(env(safe-area-inset-right), 24px);
      padding-bottom: max(env(safe-area-inset-bottom), 40px);
    }

    #header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2em;
    }

    #title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.1px;
      color: #fff;
      font-family: 'Bricolage Grotesque', sans-serif;
    }

    #header-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    #last-updated {
      font-size: 11px;
      color: #666;
      font-family: 'Bricolage Grotesque', sans-serif;
      white-space: nowrap;
    }

    #sort-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s;
    }

    #sort-btn:active { opacity: 0.5; }

    #player-list { width: 100%; }

    .player-row {
      display: flex;
      align-items: center;
      border-bottom: 0.5px solid #2e2e2e;
      padding: 10px 0;
      gap: 14px;
      will-change: transform;
      overflow: hidden;
    }

    .player-name {
      font-size: 18px;
      font-weight: 400;
      color: #fff;
      width: 190px;
      min-width: 190px;
      white-space: nowrap;
      font-family: 'Bricolage Grotesque', sans-serif;
      letter-spacing: -0.1px;
    }

    .tick-area {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(65, 1fr);
      align-items: center;
      gap: 2px;
      overflow: hidden;
    }

    .tick {
      width: 100%;
      height: calc(100% + 10px);
      background: #0977cc;
      border-radius: 0;
      margin-top: -5px;
      margin-bottom: -5px;
    }

    .tick-empty {
      width: 100%;
      height: calc(100% + 10px);
      background: transparent;
      margin-top: -5px;
      margin-bottom: -5px;
    }

    .hr-count {
      font-size: 18px;
      font-weight: 400;
      color: #fff;
      min-width: 32px;
      text-align: right;
      font-family: 'Bricolage Grotesque', sans-serif;
    }

    #status-msg {
      font-family: 'Bricolage Grotesque', sans-serif;
      color: #3a3a3a;
      font-size: 13px;
      text-align: center;
      margin-top: 48px;
    }

    @media (orientation: portrait) {
      #title { font-size: 15px; }
      .player-name { font-size: 15px; width: 130px; min-width: 130px; }
      .tick { height: calc(100% + 10px); margin-top: -5px; margin-bottom: -5px; }
      .tick-empty { height: calc(100% + 10px); margin-top: -5px; margin-bottom: -5px; }
      .hr-count { font-size: 15px; min-width: 24px; }
    }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="title">Dodger Home Runs 2026</div>
    <div id="header-right">
      <span id="last-updated"></span>
      <button id="sort-btn" title="Toggle sort" aria-label="Toggle sort order">
        <svg width="28" height="22" viewBox="0 0 28 22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="8.5" cy="5.5" r="2.5" stroke="#ffffff" stroke-width="1.6"/>
          <line x1="2" y1="5.5" x2="6" y2="5.5" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
          <line x1="11" y1="5.5" x2="26" y2="5.5" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
          <circle cx="19.5" cy="16.5" r="2.5" stroke="#ffffff" stroke-width="1.6"/>
          <line x1="2" y1="16.5" x2="17" y2="16.5" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
          <line x1="22" y1="16.5" x2="26" y2="16.5" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="player-list"></div>
  <div id="status-msg"></div>
</div>

<script>
  const TEAM_ID = 119;
  const SEASON = 2026;
  const POLL_MS = 60000;
  const MAX_TICKS = 65;

  const PLACEHOLDER = [
    { name: 'Shohei Ohtani',       hr: 8 },
    { name: 'Freddie Freeman',     hr: 5 },
    { name: 'Teoscar Hernández',   hr: 4 },
    { name: 'Will Smith',          hr: 3 },
    { name: 'Max Muncy',           hr: 3 },
    { name: 'Dalton Rushing',      hr: 2 },
    { name: 'Andy Pages',          hr: 2 },
    { name: 'Hyeseong Kim',        hr: 1 },
    { name: 'Miguel Rojas',        hr: 1 },
    { name: 'Alex Call',           hr: 0 },
    { name: 'Santiago Espinal',    hr: 0 },
    { name: 'Kyle Tucker',         hr: 0 },
    { name: 'Michael Conforto',    hr: 0 },
    { name: 'Tommy Edman',         hr: 0 },
  ];

  let sortMode = 'most';
  let players = [];
  let animating = false;
  let dataLoaded = false;

  function formatTime(d) {
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function sortPlayers(list, mode) {
    const copy = [...list];
    if (mode === 'most') {
      copy.sort((a, b) => b.hr - a.hr || a.name.localeCompare(b.name));
    } else {
      copy.sort((a, b) => a.name.localeCompare(b.name));
    }
    return copy;
  }

  function renderList(sorted) {
    const container = document.getElementById('player-list');
    container.innerHTML = '';
    sorted.forEach(p => {
      const row = document.createElement('div');
      row.className = 'player-row';
      row.dataset.name = p.name;

      const nameEl = document.createElement('div');
      nameEl.className = 'player-name';
      nameEl.textContent = p.name;

      const tickArea = document.createElement('div');
      tickArea.className = 'tick-area';
      for (let i = 0; i < MAX_TICKS; i++) {
        const cell = document.createElement('div');
        cell.className = i < p.hr ? 'tick' : 'tick-empty';
        tickArea.appendChild(cell);
      }

      const countEl = document.createElement('div');
      countEl.className = 'hr-count';
      countEl.textContent = p.hr;

      row.appendChild(nameEl);
      row.appendChild(tickArea);
      row.appendChild(countEl);
      container.appendChild(row);
    });
  }

  function animateSort(newSorted) {
    if (animating) return;
    animating = true;

    const container = document.getElementById('player-list');
    const rows = [...container.querySelectorAll('.player-row')];
    const oldPos = {};
    rows.forEach(r => { oldPos[r.dataset.name] = r.getBoundingClientRect().top; });

    renderList(newSorted);

    container.querySelectorAll('.player-row').forEach(r => {
      const old = oldPos[r.dataset.name];
      if (old === undefined) return;
      const diff = old - r.getBoundingClientRect().top;
      if (diff !== 0) {
        r.style.transform = `translateY(${diff}px)`;
        r.style.transition = 'none';
        requestAnimationFrame(() => {
          r.style.transition = 'transform 0.42s cubic-bezier(0.4, 0, 0.2, 1)';
          r.style.transform = '';
        });
      }
    });

    setTimeout(() => { animating = false; }, 480);
  }

  async function fetchData() {
    const url = `https://statsapi.mlb.com/api/v1/teams/${TEAM_ID}/roster?rosterType=active&season=${SEASON}&hydrate=person(stats(type=season,season=${SEASON},group=hitting))`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    return (data.roster || [])
      .filter(p => {
        const pos = p.position?.abbreviation || '';
        const name = p.person?.fullName || '';
        if (pos === 'P' && name !== 'Shohei Ohtani') return false;
        return true;
      })
      .map(p => {
        const stat = p.person?.stats?.[0]?.splits?.[0]?.stat;
        return { name: p.person?.fullName || 'Unknown', hr: stat?.homeRuns ?? 0 };
      });
  }

  async function refresh() {
    const statusEl = document.getElementById('status-msg');
    const updEl    = document.getElementById('last-updated');
    try {
      const data = await fetchData();
      if (data && data.length > 0) {
        players = data;
        dataLoaded = true;
        statusEl.textContent = '';
        updEl.textContent = formatTime(new Date());
        renderList(sortPlayers(players, sortMode));
      }
    } catch (e) {
      if (!dataLoaded) statusEl.textContent = 'Could not connect. Retrying…';
    }
  }

  document.getElementById('sort-btn').addEventListener('click', () => {
    sortMode = sortMode === 'most' ? 'alpha' : 'most';
    animateSort(sortPlayers(players, sortMode));
  });

  players = PLACEHOLDER;
  renderList(sortPlayers(players, sortMode));
  document.getElementById('last-updated').textContent = '––:––';

  refresh();
  setInterval(refresh, POLL_MS);
</script>
</body>
</html>
