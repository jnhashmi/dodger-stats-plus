<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Dodger HRs">
  <meta name="theme-color" content="#000000">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <title>Dodger Home Runs</title>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      background: #000;
      color: #fff;
      font-family: 'Bricolage Grotesque', -apple-system, 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; -ms-overflow-style: none; }

    #app {
      min-height: 100vh;
      min-height: -webkit-fill-available;
      display: flex;
      flex-direction: column;
    }

    /* ── Sticky header bar ── */
    #header-bar {
      position: sticky;
      top: 0;
      z-index: 40;
      background: #000;
      padding-top: max(env(safe-area-inset-top), 20px);
      padding-left: max(env(safe-area-inset-left), 24px);
      padding-right: max(env(safe-area-inset-right), 24px);
      padding-bottom: 12px;
    }

    #inner {
      padding-left: max(env(safe-area-inset-left), 24px);
      padding-right: max(env(safe-area-inset-right), 24px);
      padding-bottom: max(env(safe-area-inset-bottom), 40px);
      flex: 1;
    }

    /* ── Header ── */
    #header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.1px;
      color: #fff;
      font-family: 'Bricolage Grotesque', sans-serif;
      white-space: nowrap;
    }

    #dodger-logo {
      height: calc(28px * 1.13);
      width: auto;
      display: none;
      vertical-align: baseline;
      position: relative;
      top: 3px;
    }

    #home-runs-label {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      font-family: 'Bricolage Grotesque', sans-serif;
      white-space: nowrap;
      display: none;
      margin-left: 11px;
    }

    #ws-label {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      font-family: 'Bricolage Grotesque', sans-serif;
      white-space: nowrap;
      display: none;
      margin-left: 11px;
    }

    #year-btn {
      font-size: 18px;
      font-weight: 700;
      font-family: 'Bricolage Grotesque', sans-serif;
      color: #fff;
      background: none;
      border: 0.5px solid #6e6e6e;
      border-radius: 4px;
      padding: 2px 8px;
      cursor: pointer;
      transition: border-color 0.15s;
      line-height: 1.4;
    }
    #year-btn:active { border-color: #aaa; }

    /* WS tally */
    #ws-tally {
      font-size: 18px;
      font-weight: 400;
      color: #fff;
      font-family: 'Bricolage Grotesque', sans-serif;
      white-space: nowrap;
      display: none;
    }

    /* WS clear button */
    #ws-clear-btn {
      font-size: 18px;
      font-weight: 700;
      font-family: 'Bricolage Grotesque', sans-serif;
      color: #fff;
      background: none;
      border: 0.5px solid #6e6e6e;
      border-radius: 4px;
      padding: 2px 12px;
      cursor: pointer;
      display: none;
      line-height: 1.4;
    }
    #ws-clear-btn:active { opacity: 0.6; }

    #header-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    #last-updated {
      font-size: 11px;
      color: #666;
      font-family: 'Bricolage Grotesque', sans-serif;
      white-space: nowrap;
    }

    /* Home plate nav button — flush to right edge */
    #home-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      margin-right: -4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s;
    }
    #home-btn:active { opacity: 0.5; }

    /* ── Year dropdown overlay ── */
    #year-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 100;
      background: rgba(0,0,0,0.7);
    }
    #year-overlay.open { display: block; }

    #year-dropdown {
      position: absolute;
      background: #0a0a0a;
      border: 0.5px solid #6e6e6e;
      border-radius: 6px;
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior: contain;
      max-height: 70vh;
      width: 120px;
    }

    .year-option {
      display: block;
      width: 100%;
      padding: 10px 8px 10px 32px;
      font-size: 18px;
      font-weight: 700;
      font-family: 'Bricolage Grotesque', sans-serif;
      color: #fff;
      background: none;
      border: none;
      border-bottom: 0.5px solid #222;
      text-align: left;
      cursor: pointer;
      transition: background 0.1s;
    }
    .year-option:last-child { border-bottom: none; }
    .year-option:active { background: #1a1a1a; }
    .year-option.active { color: #0977cc; }

    /* ── Screens ── */
    #hr-screen { display: block; }
    #ws-screen { display: none; }

    /* ── HR Player list ── */
    #player-list {
      width: 100%;
      margin-top: 1.5em;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .player-row {
      display: flex;
      align-items: center;
      border-bottom: 0.5px solid #6e6e6e;
      gap: 14px;
      will-change: transform;
      height: 40px;
    }

    .player-name {
      font-size: 18px;
      font-weight: 400;
      color: #fff;
      width: 190px;
      min-width: 190px;
      white-space: nowrap;
      font-family: 'Bricolage Grotesque', sans-serif;
      letter-spacing: -0.1px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .tick-area {
      flex: 1;
      height: 100%;
      min-width: 0;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
    }

    .tick-area svg {
      display: block;
      height: 100%;
    }

    .hr-count {
      font-size: 18px;
      font-weight: 400;
      color: #fff;
      min-width: 32px;
      text-align: right;
      font-family: 'Bricolage Grotesque', sans-serif;
      flex-shrink: 0;
    }

    /* ── World Series list ── */
    #ws-list {
      width: 100%;
      margin-top: 1.5em;
    }

    .ws-row {
      display: flex;
      align-items: center;
      border-bottom: 0.5px solid #6e6e6e;
      height: 40px;
      gap: 14px;
      cursor: pointer;
    }

    .ws-year {
      font-size: 18px;
      font-weight: 400;
      color: #fff;
      width: 60px;
      min-width: 60px;
      font-family: 'Bricolage Grotesque', sans-serif;
      flex-shrink: 0;
    }

    .ws-team {
      font-size: 18px;
      font-weight: 400;
      font-family: 'Bricolage Grotesque', sans-serif;
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    .ws-team.revealed { opacity: 1; }

    /* ── Misc ── */
    #status-msg {
      font-family: 'Bricolage Grotesque', sans-serif;
      color: #444;
      font-size: 13px;
      text-align: center;
      margin-top: 48px;
    }

    #portrait-note {
      display: none;
      font-family: 'Bricolage Grotesque', sans-serif;
      color: #6e6e6e;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-align: center;
      margin-top: 32px;
      text-transform: uppercase;
    }

    #version {
      display: block;
      font-family: 'Bricolage Grotesque', sans-serif;
      color: #6e6e6e;
      font-size: 11px;
      text-align: center;
      margin-top: 8px;
    }

    @media (orientation: landscape) {
      #title-text { display: none; }
      #dodger-logo { display: inline-block; }
      #home-runs-label { display: inline-block; }
    }

    @media (orientation: portrait) {
      #title-text { display: inline; }
      #dodger-logo { display: none; }
      #home-runs-label { display: none; }
      #ws-label { margin-left: 0; }
      #title { font-size: 15px; }
      #year-btn { font-size: 15px; padding: 6px 8px; }
      .player-name { font-size: 15px; width: 130px; min-width: 130px; }
      .hr-count { font-size: 15px; min-width: 24px; }
      .ws-year { font-size: 15px; }
      .ws-team { font-size: 15px; }
      #ws-tally { font-size: 15px; }
      #ws-clear-btn { font-size: 15px; }
      #portrait-note { display: block; }
      .year-option { font-size: 15px; }
      #header { padding-bottom: 2px; }
      #header-bar { padding-bottom: 10px; }
      #home-runs-label { display: none !important; }
    }

    /* WS screen — hide year btn, show ws elements */
    body.ws-mode #year-btn { display: none; }
    body.ws-mode #last-updated { display: none; }
    body.ws-mode #ws-tally { display: block; }
    body.ws-mode #ws-clear-btn { display: block; }
    body.ws-mode #ws-label { display: inline-block; }
    body.ws-mode #home-runs-label { display: none !important; }
    body.ws-mode #title-text { display: none !important; }
    body.ws-mode #dodger-logo { display: inline-block; }
    body.ws-mode #hr-screen { display: none; }
    body.ws-mode #ws-screen { display: block; }
  </style>
</head>
<body>
<div id="app">
  <div id="header-bar">
    <div id="header">
      <div id="header-left">
        <div id="title">
          <img id="dodger-logo" src="Dodger-script.png" alt="Los Angeles Dodgers">
          <span id="title-text">Dodger Home Runs</span>
        </div>
        <span id="home-runs-label">Home Runs</span>
        <span id="ws-label">World Series Winners</span>
        <button id="year-btn">2026</button>
        <span id="ws-tally">Total 0/57</span>
        <button id="ws-clear-btn">Clear</button>
      </div>
      <div id="header-right">
        <span id="last-updated"></span>
        <button id="home-btn" title="Navigate" aria-label="Navigate">
          <svg width="22" height="26" viewBox="0 0 22 26" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Home plate: flat top, sharp point at bottom -->
            <path d="M2 3 L20 3 L20 14 L11 24 L2 14 Z" stroke="#ffffff" stroke-width="1.6" fill="none" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div id="inner">
    <!-- HR Screen -->
    <div id="hr-screen">
      <div id="player-list"></div>
      <div id="status-msg"></div>
    </div>

    <!-- World Series Screen -->
    <div id="ws-screen">
      <div id="ws-list"></div>
    </div>

    <div id="portrait-note">Best in landscape view</div>
    <div id="version">V37</div>
  </div>
</div>

<!-- Year picker overlay -->
<div id="year-overlay">
  <div id="year-dropdown"></div>
</div>

<script>
  const TEAM_ID = 119;

  // ── Auto year logic ──
  const now = new Date();
  const calYear = now.getFullYear();
  const openingDay = new Date(calYear, 2, 20);
  const CURRENT_YEAR = now >= openingDay ? calYear : calYear - 1;

  const YEARS = [];
  for (let y = CURRENT_YEAR; y >= 1969; y--) YEARS.push(y);

  const POLL_MS = 60000;
  const MAX_TICKS = 62;
  const BAR_COLOR = '#0977cc';
  const ROW_H = 40;
  const BAR_PADDING = 3;

  // ── World Series data 1969–2025 ──
  // 1994: no World Series (strike)
  const WS_WINNERS = {
    1969: { team: 'New York Mets',         color: '#002D72' },
    1970: { team: 'Baltimore Orioles',      color: '#DF4601' },
    1971: { team: 'Pittsburgh Pirates',     color: '#FDB827' },
    1972: { team: 'Oakland Athletics',      color: '#003831' },
    1973: { team: 'Oakland Athletics',      color: '#003831' },
    1974: { team: 'Oakland Athletics',      color: '#003831' },
    1975: { team: 'Cincinnati Reds',        color: '#C6011F' },
    1976: { team: 'Cincinnati Reds',        color: '#C6011F' },
    1977: { team: 'New York Yankees',       color: '#003087' },
    1978: { team: 'New York Yankees',       color: '#003087' },
    1979: { team: 'Pittsburgh Pirates',     color: '#FDB827' },
    1980: { team: 'Philadelphia Phillies',  color: '#E81828' },
    1981: { team: 'Los Angeles Dodgers',    color: '#0977cc' },
    1982: { team: 'St. Louis Cardinals',    color: '#C41E3A' },
    1983: { team: 'Baltimore Orioles',      color: '#DF4601' },
    1984: { team: 'Detroit Tigers',         color: '#0C2340' },
    1985: { team: 'Kansas City Royals',     color: '#004687' },
    1986: { team: 'New York Mets',          color: '#002D72' },
    1987: { team: 'Minnesota Twins',        color: '#002B5C' },
    1988: { team: 'Los Angeles Dodgers',    color: '#0977cc' },
    1989: { team: 'Oakland Athletics',      color: '#003831' },
    1990: { team: 'Cincinnati Reds',        color: '#C6011F' },
    1991: { team: 'Minnesota Twins',        color: '#002B5C' },
    1992: { team: 'Toronto Blue Jays',      color: '#134A8E' },
    1993: { team: 'Toronto Blue Jays',      color: '#134A8E' },
    1994: null, // no World Series
    1995: { team: 'Atlanta Braves',         color: '#CE1141' },
    1996: { team: 'New York Yankees',       color: '#003087' },
    1997: { team: 'Florida Marlins',        color: '#0077C8' },
    1998: { team: 'New York Yankees',       color: '#003087' },
    1999: { team: 'New York Yankees',       color: '#003087' },
    2000: { team: 'New York Yankees',       color: '#003087' },
    2001: { team: 'Arizona Diamondbacks',   color: '#A71930' },
    2002: { team: 'Anaheim Angels',         color: '#BA0021' },
    2003: { team: 'Florida Marlins',        color: '#0077C8' },
    2004: { team: 'Boston Red Sox',         color: '#BD3039' },
    2005: { team: 'Chicago White Sox',      color: '#27251F' },
    2006: { team: 'St. Louis Cardinals',    color: '#C41E3A' },
    2007: { team: 'Boston Red Sox',         color: '#BD3039' },
    2008: { team: 'Philadelphia Phillies',  color: '#E81828' },
    2009: { team: 'New York Yankees',       color: '#003087' },
    2010: { team: 'San Francisco Giants',   color: '#FD5A1E' },
    2011: { team: 'St. Louis Cardinals',    color: '#C41E3A' },
    2012: { team: 'San Francisco Giants',   color: '#FD5A1E' },
    2013: { team: 'Boston Red Sox',         color: '#BD3039' },
    2014: { team: 'San Francisco Giants',   color: '#FD5A1E' },
    2015: { team: 'Kansas City Royals',     color: '#004687' },
    2016: { team: 'Chicago Cubs',           color: '#0E3386' },
    2017: { team: 'Houston Astros',         color: '#EB6E1F' },
    2018: { team: 'Boston Red Sox',         color: '#BD3039' },
    2019: { team: 'Washington Nationals',   color: '#AB0003' },
    2020: { team: 'Los Angeles Dodgers',    color: '#0977cc' },
    2021: { team: 'Atlanta Braves',         color: '#CE1141' },
    2022: { team: 'Houston Astros',         color: '#EB6E1F' },
    2023: { team: 'Texas Rangers',          color: '#003278' },
    2024: { team: 'Los Angeles Dodgers',    color: '#0977cc' },
    2025: { team: 'Los Angeles Dodgers',    color: '#0977cc' },
  };

  // Count total WS years (exclude 1994)
  const WS_YEARS = Object.keys(WS_WINNERS).map(Number).sort((a,b) => a - b);
  const WS_TOTAL = WS_YEARS.filter(y => WS_WINNERS[y] !== null).length;

  // Revealed state
  let wsRevealed = {};
  let wsRevealedCount = 0;

  // HR state
  let sortMode = 'most';
  let players = [];
  let animating = false;
  let dataLoaded = false;
  let selectedYear = CURRENT_YEAR;
  let pollTimer = null;
  let currentScreen = 'hr'; // 'hr' or 'ws'

  // ── Build year dropdown ──
  const dropdown = document.getElementById('year-dropdown');
  YEARS.forEach(y => {
    const btn = document.createElement('button');
    btn.className = 'year-option' + (y === CURRENT_YEAR ? ' active' : '');
    btn.textContent = y;
    btn.dataset.year = y;
    btn.addEventListener('click', () => selectYear(y));
    dropdown.appendChild(btn);
  });

  document.getElementById('year-btn').addEventListener('click', () => {
    const btn = document.getElementById('year-btn');
    const rect = btn.getBoundingClientRect();
    const dd = document.getElementById('year-dropdown');
    dd.style.left = (rect.left - 20) + 'px';
    dd.style.top = (rect.bottom + 4) + 'px';
    document.getElementById('year-overlay').classList.add('open');
  });

  document.getElementById('year-overlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('year-overlay')) {
      document.getElementById('year-overlay').classList.remove('open');
    }
  });

  function selectYear(y) {
    document.getElementById('year-overlay').classList.remove('open');
    if (y === selectedYear) return;
    selectedYear = y;
    document.getElementById('year-btn').textContent = y;
    document.querySelectorAll('.year-option').forEach(b => {
      b.classList.toggle('active', parseInt(b.dataset.year) === y);
    });
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    document.getElementById('last-updated').textContent = '';
    document.getElementById('last-updated').style.display = 'none';
    loadYear(y);
  }

  // ── Home plate nav ──
  document.getElementById('home-btn').addEventListener('click', () => {
    if (currentScreen === 'hr') {
      currentScreen = 'ws';
      document.body.classList.add('ws-mode');
      // Show WS label in landscape
      if (window.innerWidth > window.innerHeight) {
        document.getElementById('ws-label').style.display = 'inline-block';
      } else {
        document.getElementById('title-text').textContent = 'World Series Winners';
        document.getElementById('title-text').style.display = 'inline';
      }
      buildWSList();
    } else {
      currentScreen = 'hr';
      document.body.classList.remove('ws-mode');
      // Restore title
      document.getElementById('title-text').textContent = 'Dodger Home Runs';
      document.getElementById('ws-label').style.display = '';
      document.getElementById('last-updated').style.display = '';
    }
  });

  // ── WS Clear button ──
  document.getElementById('ws-clear-btn').addEventListener('click', () => {
    wsRevealed = {};
    wsRevealedCount = 0;
    updateWSTally();
    document.querySelectorAll('.ws-team').forEach(el => {
      el.classList.remove('revealed');
      el.textContent = '';
    });
  });

  function updateWSTally() {
    document.getElementById('ws-tally').textContent = `Total ${wsRevealedCount}/${WS_TOTAL}`;
  }

  // ── Build WS list ──
  function buildWSList() {
    const list = document.getElementById('ws-list');
    list.innerHTML = '';
    WS_YEARS.forEach(year => {
      const data = WS_WINNERS[year];
      const row = document.createElement('div');
      row.className = 'ws-row';
      row.dataset.year = year;

      const yearEl = document.createElement('div');
      yearEl.className = 'ws-year';
      yearEl.textContent = year;

      const teamEl = document.createElement('div');
      teamEl.className = 'ws-team';
      if (data === null) {
        // 1994 — no WS
        teamEl.style.color = '#444';
        teamEl.textContent = 'No World Series';
        teamEl.classList.add('revealed');
      } else {
        teamEl.style.color = data.color;
        if (wsRevealed[year]) {
          teamEl.textContent = data.team;
          teamEl.classList.add('revealed');
        }
      }

      row.appendChild(yearEl);
      row.appendChild(teamEl);

      if (data !== null && !wsRevealed[year]) {
        row.addEventListener('click', () => revealWS(year, teamEl, data));
      }

      list.appendChild(row);
    });
    updateWSTally();
  }

  function revealWS(year, teamEl, data) {
    if (wsRevealed[year]) return;
    wsRevealed[year] = true;
    wsRevealedCount++;
    teamEl.textContent = data.team;
    teamEl.classList.add('revealed');
    updateWSTally();
  }

  // ── HR utilities ──
  function formatTime(d) {
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function sortPlayers(list, mode) {
    const copy = [...list];
    if (mode === 'most') {
      copy.sort((a, b) => b.hr - a.hr || a.name.localeCompare(b.name));
    } else {
      copy.sort((a, b) => a.name.localeCompare(b.name));
    }
    return copy;
  }

  function buildTickSVG(hr, displayHr) {
    const d = displayHr !== undefined ? displayHr : hr;
    const slots = Math.max(MAX_TICKS, hr);
    const barH = ROW_H - BAR_PADDING * 2;
    const barY = BAR_PADDING;
    const slotW = 100 / MAX_TICKS;
    const viewW = slots * slotW;
    const gapFrac = 0.18;
    const barW = slotW * (1 - gapFrac);
    const SHEET_W = 40706;
    const TOTAL_FRAMES = 59;
    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('viewBox', `0 0 ${viewW} ${ROW_H}`);
    svg.setAttribute('preserveAspectRatio', 'none');
    svg.style.width = hr > MAX_TICKS ? `${(hr / MAX_TICKS) * 100}%` : '100%';
    for (let i = 0; i < d; i++) {
      const rect = document.createElementNS(svgNS, 'rect');
      rect.setAttribute('x', i * slotW + slotW * (gapFrac / 2));
      rect.setAttribute('y', barY);
      rect.setAttribute('width', barW);
      rect.setAttribute('height', barH);
      rect.setAttribute('fill', BAR_COLOR);
      svg.appendChild(rect);
    }
    return svg;
  }

  function renderList(sorted, instant) {
    const container = document.getElementById('player-list');
    container.innerHTML = '';
    sorted.forEach(p => {
      const row = document.createElement('div');
      row.className = 'player-row';
      row.dataset.name = p.name;
      row.dataset.hr = p.hr;
      const nameEl = document.createElement('div');
      nameEl.className = 'player-name';
      nameEl.textContent = p.name;
      const tickArea = document.createElement('div');
      tickArea.className = 'tick-area';
      tickArea.appendChild(buildTickSVG(p.hr, instant ? p.hr : 0));
      const countEl = document.createElement('div');
      countEl.className = 'hr-count';
      countEl.textContent = instant ? p.hr : 0;
      row.appendChild(nameEl);
      row.appendChild(tickArea);
      row.appendChild(countEl);
      container.appendChild(row);
    });
  }

  // ── Tap name column to toggle sort ──
  document.getElementById('player-list').addEventListener('click', (e) => {
    if (animating) return;
    const row = e.target.closest('.player-row');
    if (!row) return;
    const nameEl = row.querySelector('.player-name');
    if (!nameEl) return;
    const nameRect = nameEl.getBoundingClientRect();
    if (e.clientX > nameRect.right) return; // only respond to taps in name column
    sortMode = sortMode === 'most' ? 'alpha' : 'most';
    animateSort(sortPlayers(players, sortMode));
  });

  function animateHRGrowIn(sorted) {
    const maxHR = Math.max(...sorted.map(p => p.hr), 0);
    if (maxHR === 0) return;
    const rows = document.querySelectorAll('.player-row');
    const rowMap = {};
    rows.forEach(r => { rowMap[r.dataset.name] = r; });
    let tick = 0;
    const timer = setInterval(() => {
      tick++;
      sorted.forEach(p => {
        const row = rowMap[p.name];
        if (!row) return;
        const show = Math.min(tick, p.hr);
        const tickArea = row.querySelector('.tick-area');
        const countEl = row.querySelector('.hr-count');
        tickArea.innerHTML = '';
        tickArea.appendChild(buildTickSVG(p.hr, show));
        countEl.textContent = show;
      });
      if (tick >= maxHR) clearInterval(timer);
    }, 40);
  }

  function animateSort(newSorted) {
    if (animating) return;
    animating = true;
    const container = document.getElementById('player-list');
    const oldPos = {};
    container.querySelectorAll('.player-row').forEach(r => {
      oldPos[r.dataset.name] = r.getBoundingClientRect().top;
    });
    renderList(newSorted, true);
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        container.querySelectorAll('.player-row').forEach(r => {
          const old = oldPos[r.dataset.name];
          if (old === undefined) return;
          const diff = old - r.getBoundingClientRect().top;
          if (diff !== 0) {
            r.style.transition = 'none';
            r.style.transform = `translateY(${diff}px)`;
            requestAnimationFrame(() => {
              r.style.transition = 'transform 0.45s cubic-bezier(0.4, 0, 0.2, 1)';
              r.style.transform = '';
            });
          }
        });
        setTimeout(() => { animating = false; }, 500);
      });
    });
  }

  // ── Batter sprite animation ──
  function playBatterAnimation(onComplete) {
    const firstRow = document.querySelector('.player-row');
    if (!firstRow) { onComplete(); return; }
    const rowRect = firstRow.getBoundingClientRect();
    const TOTAL_FRAMES = 59;
    const USE_FRAMES = 58;
    const FRAME_W_PRECISE = 40706 / TOTAL_FRAMES;
    const FRAME_W = Math.round(FRAME_W_PRECISE);
    const FRAME_H = 307;
    const displayH = 102;
    const displayW = Math.round(FRAME_W * (displayH / FRAME_H));
    const tickArea = firstRow.querySelector('.tick-area');
    const tickRect = tickArea.getBoundingClientRect();
    const isPortrait = window.innerHeight > window.innerWidth;
    const leftX = Math.round(tickRect.left + (isPortrait ? 15 : 55));
    const bottomY = Math.round(rowRect.bottom + 7);
    const dpr = window.devicePixelRatio || 1;
    const canvas = document.createElement('canvas');
    canvas.width = displayW * dpr;
    canvas.height = displayH * dpr;
    canvas.style.position = 'fixed';
    canvas.style.left = leftX + 'px';
    canvas.style.top = (bottomY - displayH) + 'px';
    canvas.style.width = displayW + 'px';
    canvas.style.height = displayH + 'px';
    canvas.style.pointerEvents = 'none';
    canvas.style.zIndex = '50';
    canvas.style.imageRendering = 'auto';
    document.body.appendChild(canvas);
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    const img = new Image();
    img.src = 'spritesheet.png';
    const FPS = 18;
    const FRAME_DURATION = 1000 / FPS;
    let currentFrame = 0;
    let lastFrameTime = 0;
    let completed = false;
    img.onload = () => {
      function tick(ts) {
        if (completed) return;
        if (!lastFrameTime) lastFrameTime = ts;
        if (ts - lastFrameTime >= FRAME_DURATION) {
          lastFrameTime = ts;
          ctx.clearRect(0, 0, displayW, displayH);
          ctx.globalAlpha = 1;
          ctx.drawImage(img, currentFrame * FRAME_W_PRECISE, 0, FRAME_W_PRECISE, FRAME_H, 0, 0, displayW, displayH);
          currentFrame++;
          if (currentFrame >= USE_FRAMES) {
            completed = true;
            canvas.remove();
            onComplete();
            return;
          }
        }
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    };
    img.onerror = () => { canvas.remove(); onComplete(); };
  }

  function transitionToYear(sorted) {
    const container = document.getElementById('player-list');
    container.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
    container.style.opacity = '0';
    container.style.transform = 'translateY(-8px)';
    // Instant scroll to top while list is faded out — invisible to user
    window.scrollTo(0, 0);
    document.documentElement.scrollTop = 0;
    document.body.scrollTop = 0;
    setTimeout(() => {
      renderList(sorted, false);
      container.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
      container.style.opacity = '1';
      container.style.transform = 'translateY(0)';
      setTimeout(() => {
        playBatterAnimation(() => { animateHRGrowIn(sorted); });
      }, 220);
    }, 220);
  }

  async function fetchData(year) {
    const url = `https://statsapi.mlb.com/api/v1/teams/${TEAM_ID}/roster?rosterType=active&season=${year}&hydrate=person(stats(type=season,season=${year},group=hitting))`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    return (data.roster || [])
      .map(p => {
        const stat = p.person?.stats?.[0]?.splits?.[0]?.stat;
        return {
          name: p.person?.fullName || 'Unknown',
          hr: stat?.homeRuns ?? 0,
          pos: p.position?.abbreviation || ''
        };
      })
      .filter(p => {
        if (p.name === 'Shohei Ohtani') return true; // always include
        if (p.pos === 'P') return p.hr >= 1; // pitchers only if they homered
        return true; // all position players
      })
      .map(({ name, hr }) => ({ name, hr }));
  }

  async function loadYear(year, initial) {
    const statusEl = document.getElementById('status-msg');
    const updEl = document.getElementById('last-updated');
    try {
      const data = await fetchData(year);
      if (data && data.length > 0) {
        players = data;
        dataLoaded = true;
        statusEl.textContent = '';
        if (year === CURRENT_YEAR) {
          updEl.textContent = formatTime(new Date());
          updEl.style.display = '';
        } else {
          updEl.textContent = '';
          updEl.style.display = 'none';
        }
        const sorted = sortPlayers(players, sortMode);
        if (initial) {
          renderList(sorted, false);
          const container = document.getElementById('player-list');
          container.style.opacity = '1';
          container.style.transform = 'translateY(0)';
          animateHRGrowIn(sorted);
        } else {
          transitionToYear(sorted);
        }
        if (year === CURRENT_YEAR) {
          pollTimer = setInterval(() => refreshCurrentYear(), POLL_MS);
        }
      }
    } catch (e) {
      if (!dataLoaded) statusEl.textContent = 'Could not connect. Retrying…';
    }
  }

  async function refreshCurrentYear() {
    if (selectedYear !== CURRENT_YEAR) return;
    try {
      const data = await fetchData(CURRENT_YEAR);
      if (data && data.length > 0) {
        players = data;
        document.getElementById('last-updated').textContent = formatTime(new Date());
        renderList(sortPlayers(players, sortMode), true);
      }
    } catch (e) {}
  }

  // ── Boot ──
  document.getElementById('year-btn').textContent = CURRENT_YEAR;
  const container = document.getElementById('player-list');
  container.style.opacity = '0';
  loadYear(CURRENT_YEAR, true);
</script>
</body>
