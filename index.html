<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Dodger HRs">
  <meta name="theme-color" content="#000000">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <title>Dodger Home Runs</title>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      background: #000;
      color: #fff;
      font-family: 'Bricolage Grotesque', -apple-system, 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; -ms-overflow-style: none; }

    #app {
      min-height: 100vh;
      min-height: -webkit-fill-available;
      display: flex;
      flex-direction: column;
    }

    /* ── Sticky header bar ── */
    #header-bar {
      position: sticky;
      top: 0;
      z-index: 300;
      background: #000;
      padding-top: max(env(safe-area-inset-top), 20px);
      padding-left: max(env(safe-area-inset-left), 24px);
      padding-right: max(env(safe-area-inset-right), 24px);
      padding-bottom: 12px;
    }

    #inner {
      padding-left: max(env(safe-area-inset-left), 24px);
      padding-right: max(env(safe-area-inset-right), 24px);
      padding-bottom: max(env(safe-area-inset-bottom), 40px);
      flex: 1;
    }

    /* ── Header ── */
    #header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }


    #title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.1px;
      color: #fff;
      font-family: 'Bricolage Grotesque', sans-serif;
      white-space: nowrap;
    }

    #dodger-logo {
      height: calc(28px * 1.13);
      width: auto;
      display: none;
      vertical-align: baseline;
      position: relative;
      top: 3px;
    }

    #home-runs-label {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      font-family: 'Bricolage Grotesque', sans-serif;
      white-space: nowrap;
      display: none;
      margin-left: 11px;
    }

    #ws-label {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      font-family: 'Bricolage Grotesque', sans-serif;
      white-space: nowrap;
      display: none;
      margin-left: 11px;
    }

    #year-btn {
      font-size: 18px;
      font-weight: 700;
      font-family: 'Bricolage Grotesque', sans-serif;
      color: #fff;
      background: none;
      border: 0.5px solid #6e6e6e;
      border-radius: 4px;
      padding: 2px 8px;
      cursor: pointer;
      transition: border-color 0.15s;
      line-height: 1.4;
    }
    #year-btn:active { border-color: #aaa; }

    /* WS tally */
    #ws-tally {
      font-size: 18px;
      font-weight: 400;
      color: #fff;
      font-family: 'Bricolage Grotesque', sans-serif;
      white-space: nowrap;
      display: none;
    }

    /* WS clear button — same height as year-btn */
    #ws-clear-btn {
      font-size: 18px;
      font-weight: 700;
      font-family: 'Bricolage Grotesque', sans-serif;
      color: #fff;
      background: none;
      border: 0.5px solid #6e6e6e;
      border-radius: 4px;
      padding: 2px 12px;
      cursor: pointer;
      display: none;
      line-height: 1.4;
      flex-shrink: 0;
      white-space: nowrap;
      vertical-align: middle;
    }
    #ws-clear-btn:active { opacity: 0.6; }

    #header-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    #last-updated {
      font-size: 11px;
      color: #666;
      font-family: 'Bricolage Grotesque', sans-serif;
      white-space: nowrap;
    }

    /* Home plate nav button — flush to right edge */
    #home-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      margin-right: -4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s;
      position: relative;
      z-index: 300;
    }
    #home-btn:active { opacity: 0.5; }

    /* ── Year dropdown overlay ── */
    #year-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 100;
      background: rgba(0,0,0,0.7);
    }
    #year-overlay.open { display: block; }

    #year-dropdown {
      position: absolute;
      background: #0a0a0a;
      border: 0.5px solid #6e6e6e;
      border-radius: 6px;
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior: contain;
      max-height: 70vh;
      width: 140px;
    }

    .year-option {
      display: block;
      width: 100%;
      padding: 10px 8px 10px 49px;
      font-size: 18px;
      font-weight: 700;
      font-family: 'Bricolage Grotesque', sans-serif;
      color: #fff;
      background: none;
      border: none;
      border-bottom: 0.5px solid #222;
      text-align: left;
      cursor: pointer;
      transition: background 0.1s;
    }
    .year-option:last-child { border-bottom: none; }
    .year-option:active { background: #1a1a1a; }
    .year-option.active { color: #0977cc; }

    /* ── Screens ── */
    #hr-screen { display: block; }
    #ws-screen { display: none; }

    /* ── HR Player list ── */
    #player-list {
      width: 100%;
      margin-top: 1.5em;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .player-row {
      display: flex;
      align-items: center;
      border-bottom: 0.5px solid #6e6e6e;
      gap: 14px;
      will-change: transform;
      height: 40px;
    }

    .player-name {
      font-size: 18px;
      font-weight: 400;
      color: #fff;
      width: 190px;
      min-width: 190px;
      white-space: nowrap;
      font-family: 'Bricolage Grotesque', sans-serif;
      letter-spacing: -0.1px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .tick-area {
      flex: 1;
      height: 100%;
      min-width: 0;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
    }

    .tick-area svg {
      display: block;
      height: 100%;
    }

    .hr-count {
      font-size: 18px;
      font-weight: 400;
      color: #fff;
      min-width: 32px;
      text-align: right;
      font-family: 'Bricolage Grotesque', sans-serif;
      flex-shrink: 0;
    }

    /* ── World Series list ── */
    #ws-list {
      width: 100%;
      margin-top: 1.5em;
    }

    .ws-row {
      display: flex;
      align-items: center;
      border-bottom: 0.5px solid #6e6e6e;
      height: 40px;
      gap: 14px;
      cursor: pointer;
    }

    .ws-year {
      font-size: 18px;
      font-weight: 400;
      color: #fff;
      width: 60px;
      min-width: 60px;
      font-family: 'Bricolage Grotesque', sans-serif;
      flex-shrink: 0;
    }

    .ws-team {
      font-size: 18px;
      font-weight: 400;
      font-family: 'Bricolage Grotesque', sans-serif;
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    .ws-team.revealed { opacity: 1; }

    /* ── Misc ── */
    #status-msg {
      font-family: 'Bricolage Grotesque', sans-serif;
      color: #444;
      font-size: 13px;
      text-align: center;
      margin-top: 48px;
    }

    #portrait-note {
      display: none;
      font-family: 'Bricolage Grotesque', sans-serif;
      color: #6e6e6e;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-align: center;
      margin-top: 32px;
      text-transform: uppercase;
    }

    #version {
      display: block;
      font-family: 'Bricolage Grotesque', sans-serif;
      color: #6e6e6e;
      font-size: 11px;
      text-align: center;
      margin-top: 8px;
    }

    #title-text { display: none; }

    @media (orientation: landscape) {
      #dodger-logo { display: inline-block; }
      #home-runs-label { display: inline-block; }
      body.ws-mode .ws-year { min-width: 190px; width: 190px; }
    }

    @media (orientation: portrait) {
      #title-text { display: inline; }
      #dodger-logo { display: none !important; }
      #home-runs-label { display: none !important; }
      #header-left { align-items: baseline; }
      #ws-label { margin-left: 0; font-size: 15px; font-weight: 700; line-height: 1.4; }
      #ops-label { margin-left: 0; font-size: 15px; font-weight: 700; line-height: 1.4; }
      #title { font-size: 15px; line-height: 1.4; }
      #year-btn { font-size: 15px; padding: 2px 8px; }
      #ws-tally { font-size: 15px; font-weight: 400; line-height: 1.4; }
      #ws-clear-btn { font-size: 15px; padding: 2px 8px; }
      .player-name { font-size: 15px; width: 130px; min-width: 130px; }
      .hr-count { font-size: 15px; min-width: 24px; }
      .ws-year { font-size: 15px; }
      .ws-team { font-size: 15px; }
      .ops-name { font-size: 15px; width: 130px; min-width: 130px; }
      .ops-value { font-size: 15px; }
      #ops-bar { left: 130px; }
      #ops-labels { left: 130px; display: none; }
      #portrait-note { display: block; }
      .year-option { font-size: 15px; }
      #header { padding-bottom: 2px; }
      #header-bar { padding-bottom: 10px; }
    }

    /* ── Nav overlay ── */
    #nav-overlay {
      display: block;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 250;
      pointer-events: none;
      background: rgba(0,0,0,0);
      transition: background 0.25s ease;
    }
    #nav-overlay.open {
      pointer-events: auto;
      background: rgba(0,0,0,0.4);
    }

    #nav-panel {
      position: absolute;
      background: #0977cc;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      z-index: 350;
    }

    /* Landscape: slides in from right */
    @media (orientation: landscape) {
      #nav-panel {
        top: 0; right: 0; bottom: 0;
        width: 42%;
        /* padding-top calculated to push first button to first-row baseline */
        padding-top: 0;
        padding-left: 32px;
        padding-right: max(env(safe-area-inset-right), 24px);
        padding-bottom: 40px;
        transform: translateX(110%);
        transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      }
      #nav-overlay.open #nav-panel { transform: translateX(0); }
    }

    /* Portrait: slides down from top */
    @media (orientation: portrait) {
      #nav-panel {
        top: 0; left: 0; right: 0;
        padding-top: 0;
        padding-left: max(env(safe-area-inset-left), 24px);
        padding-right: max(env(safe-area-inset-right), 24px);
        padding-bottom: 32px;
        transform: translateY(-110%);
        transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      }
      #nav-overlay.open #nav-panel { transform: translateY(0); }
    }

    /* Nav buttons — match year button style exactly */
    #nav-panel {
      gap: 0; /* remove gap — use row-height spacing instead */
    }

    .nav-btn-row {
      height: 40px; /* exactly one player row height */
      display: flex;
      align-items: center; /* button baseline aligns with player row */
    }

    .nav-btn {
      font-size: 18px;
      font-weight: 700;
      font-family: 'Bricolage Grotesque', sans-serif;
      color: #fff;
      background: none;
      border: 0.5px solid rgba(255,255,255,0.5);
      border-radius: 4px;
      padding: 2px 8px;
      cursor: pointer;
      text-align: left;
      line-height: 1.4;
      white-space: nowrap;
      transition: background 0.1s;
      display: inline-block;
      width: auto;
    }
    .nav-btn:active { background: rgba(255,255,255,0.15); }

    @media (orientation: portrait) {
      .nav-btn { font-size: 15px; }
    }

    /* ── OPS screen ── */
    #ops-screen { display: none; }

    /* OPS scale bar container */
    #ops-scale {
      margin-top: 1.5em;
      margin-bottom: 0;
      position: relative;
      height: 40px; /* same row height — scale sits in its own row */
    }

    /* The color bar itself */
    #ops-bar {
      position: absolute;
      left: 190px; /* aligns with tick area — same as name column width */
      right: 32px; /* aligns with hr-count area */
      top: 50%;
      transform: translateY(-50%);
      height: 4px;
      border-radius: 0;
      display: flex;
      overflow: hidden;
    }

    .ops-segment {
      height: 100%;
    }

    /* Threshold labels above bar */
    #ops-labels {
      position: absolute;
      left: 190px;
      right: 32px;
      top: 0;
      height: 100%;
      pointer-events: none;
    }

    .ops-label {
      position: absolute;
      font-size: 11px;
      font-weight: 400;
      font-family: 'Bricolage Grotesque', sans-serif;
      color: #6e6e6e;
      transform: translateX(-50%);
      top: 0;
      line-height: 1;
    }

    /* Vertical divider lines in rows */
    .ops-divider {
      position: absolute;
      top: 3px; /* same gap as BAR_PADDING */
      bottom: 3px;
      width: 0.5px;
      background: #6e6e6e;
      pointer-events: none;
    }

    /* OPS player rows */
    .ops-row {
      display: flex;
      align-items: center;
      border-bottom: 0.5px solid #6e6e6e;
      gap: 14px;
      height: 40px;
      position: relative;
      cursor: pointer;
    }

    .ops-name {
      font-size: 18px;
      font-weight: 400;
      color: #fff;
      width: 190px;
      min-width: 190px;
      white-space: nowrap;
      font-family: 'Bricolage Grotesque', sans-serif;
      letter-spacing: -0.1px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .ops-track {
      flex: 1;
      height: 100%;
      position: relative;
      min-width: 0;
    }

    .ops-dot {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    .ops-value {
      font-size: 18px;
      font-weight: 400;
      color: #fff;
      min-width: 48px;
      text-align: right;
      font-family: 'Bricolage Grotesque', sans-serif;
      flex-shrink: 0;
    }

    /* WS screen — hide year btn, show ws elements */
    body.ws-mode #year-btn { display: none; }
    body.ws-mode #last-updated { display: none; }
    body.ws-mode #ws-tally { display: block; }
    body.ws-mode #ws-clear-btn { display: block; }
    body.ws-mode #ws-label { display: inline-block; }
    body.ws-mode #home-runs-label { display: none !important; }
    body.ws-mode #title-text { display: none !important; }
    body.ws-mode #dodger-logo { display: inline-block; }
    body.ws-mode #hr-screen { display: none; }
    body.ws-mode #ws-screen { display: block; }
    body.ws-mode #portrait-note { display: none !important; }
    body.ws-mode #ops-screen { display: none; }

    /* OPS mode */
    body.ops-mode #year-btn { display: inline-block; }
    body.ops-mode #last-updated { display: none; }
    body.ops-mode #ops-label { display: inline-block; }
    body.ops-mode #home-runs-label { display: none !important; }
    body.ops-mode #title-text { display: none !important; }
    body.ops-mode #dodger-logo { display: inline-block; }
    body.ops-mode #hr-screen { display: none; }
    body.ops-mode #ws-screen { display: none; }
    body.ops-mode #ops-screen { display: block; }
    body.ops-mode #portrait-note { display: none; }
    body.ops-mode #ws-tally { display: none; }
    body.ops-mode #ws-clear-btn { display: none; }
    body.ops-mode #ws-label { display: none; }

    /* Portrait WS mode */
    @media (orientation: portrait) {
      body.ws-mode #dodger-logo { display: none !important; }
      body.ws-mode #ws-label { display: inline-block !important; }
      body.ws-mode #title { display: none; }
      body.ops-mode #dodger-logo { display: none !important; }
      body.ops-mode #ops-label { display: inline-block !important; }
      body.ops-mode #title { display: none; }
      body.ops-mode #portrait-note { display: block !important; }
      #ops-labels { display: none; } /* hide threshold numbers in portrait */
    }
  </style>
</head>
<body>
<div id="app">
  <div id="header-bar">
    <div id="header">
      <div id="header-left">
        <div id="title">
          <img id="dodger-logo" src="Dodger-script.png" alt="Los Angeles Dodgers">
          <span id="title-text">Dodger Home Runs</span>
        </div>
        <span id="home-runs-label">Home Runs</span>
        <span id="ws-label">World Series Challenge</span>
        <span id="ops-label" style="display:none;font-size:18px;font-weight:700;font-family:'Bricolage Grotesque',sans-serif;color:#fff;white-space:nowrap;margin-left:11px;">On-base Plus Slugging</span>
        <button id="year-btn">2026</button>
        <span id="ws-tally">Total 0/57</span>
        <button id="ws-clear-btn">Clear</button>
      </div>
      <div id="header-right">
        <span id="last-updated"></span>
        <button id="home-btn" title="Navigate" aria-label="Navigate">
          <svg width="19" height="24" viewBox="0 0 22 26" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 4 L20 4 L20 15 L11 23 L2 15 Z" stroke="#ffffff" stroke-width="1.6" fill="none" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div id="inner">
    <!-- HR Screen -->
    <div id="hr-screen">
      <div id="player-list"></div>
      <div id="status-msg"></div>
    </div>

    <!-- World Series Screen -->
    <div id="ws-screen">
      <div id="ws-tap-reveal" style="font-size:11px;font-weight:700;font-family:'Bricolage Grotesque',sans-serif;color:#6e6e6e;letter-spacing:0.08em;text-transform:uppercase;margin-top:1.5em;margin-bottom:0;height:40px;display:flex;align-items:center;">TAP TO REVEAL</div>
      <div id="ws-list"></div>
    </div>

    <!-- OPS Screen -->
    <div id="ops-screen">
      <div id="ops-scale">
        <div id="ops-labels"></div>
        <div id="ops-bar"></div>
      </div>
      <div id="ops-list"></div>
    </div>

    <div id="portrait-note">Best in landscape view</div>
    <div id="version">V60</div>
  </div>
</div>

<!-- Nav overlay -->
<div id="nav-overlay">
  <div id="nav-panel">
    <div class="nav-btn-row"><button class="nav-btn" data-screen="hr">Home Runs</button></div>
    <div class="nav-btn-row"><button class="nav-btn" data-screen="ops">On-base Plus Slugging</button></div>
    <div class="nav-btn-row"><button class="nav-btn" data-screen="ws">World Series Challenge</button></div>
  </div>
</div>

<!-- Year picker overlay -->
<div id="year-overlay">
  <div id="year-dropdown"></div>
</div>

<script>
  const TEAM_ID = 119;

  // ── Auto year logic ──
  const now = new Date();
  const calYear = now.getFullYear();
  const openingDay = new Date(calYear, 2, 20);
  const CURRENT_YEAR = now >= openingDay ? calYear : calYear - 1;

  const YEARS = [];
  for (let y = CURRENT_YEAR; y >= 1969; y--) YEARS.push(y);

  const POLL_MS = 60000;
  const MAX_TICKS = 62;
  const BAR_COLOR = '#0977cc';
  const ROW_H = 40;
  const BAR_PADDING = 3;

  // ── World Series data 1969–2025 ──
  const WS_WINNERS = {
    1969: { team: 'New York Mets',         color: '#0f65ff' },
    1970: { team: 'Baltimore Orioles',      color: '#e36a30' },
    1971: { team: 'Pittsburgh Pirates',     color: '#e3aa30' },
    1972: { team: 'Oakland Athletics',      color: '#09951f' },
    1973: { team: 'Oakland Athletics',      color: '#09951f' },
    1974: { team: 'Oakland Athletics',      color: '#09951f' },
    1975: { team: 'Cincinnati Reds',        color: '#cc2509' },
    1976: { team: 'Cincinnati Reds',        color: '#cc2509' },
    1977: { team: 'New York Yankees',       color: '#a6a8ab' },
    1978: { team: 'New York Yankees',       color: '#a6a8ab' },
    1979: { team: 'Pittsburgh Pirates',     color: '#e3aa30' },
    1980: { team: 'Philadelphia Phillies',  color: '#cc2509' },
    1981: { team: 'Los Angeles Dodgers',    color: '#0977cc' },
    1982: { team: 'St. Louis Cardinals',    color: '#b92e24' },
    1983: { team: 'Baltimore Orioles',      color: '#e36a30' },
    1984: { team: 'Detroit Tigers',         color: '#0f65ff' },
    1985: { team: 'Kansas City Royals',     color: '#0f65ff' },
    1986: { team: 'New York Mets',          color: '#0f65ff' },
    1987: { team: 'Minnesota Twins',        color: '#b92e24' },
    1988: { team: 'Los Angeles Dodgers',    color: '#0977cc' },
    1989: { team: 'Oakland Athletics',      color: '#09951f' },
    1990: { team: 'Cincinnati Reds',        color: '#cc2509' },
    1991: { team: 'Minnesota Twins',        color: '#b92e24' },
    1992: { team: 'Toronto Blue Jays',      color: '#0977cc' },
    1993: { team: 'Toronto Blue Jays',      color: '#0977cc' },
    1994: { team: "No World Series.", color: '#a6a8ab', noWS: true },
    1995: { team: 'Atlanta Braves',         color: '#cc2509' },
    1996: { team: 'New York Yankees',       color: '#a6a8ab' },
    1997: { team: 'Florida Marlins',        color: '#0b9eab' },
    1998: { team: 'New York Yankees',       color: '#a6a8ab' },

  function buildTickSVG(hr, displayHr, priorHr) {
    const d = displayHr !== undefined ? displayHr : hr;
    const prior = priorHr || 0;
    // Grey bars show when prior year pace exceeds current — only the gap above current
    const greyCount = prior > hr ? prior - hr : 0;
    const totalSlots = Math.max(MAX_TICKS, hr, prior);
    const barH = ROW_H - BAR_PADDING * 2;
    const barY = BAR_PADDING;
    const slotW = 100 / MAX_TICKS;
    const viewW = totalSlots * slotW;
    const gapFrac = 0.18;
    const barW = slotW * (1 - gapFrac);
    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('viewBox', `0 0 ${viewW} ${ROW_H}`);
    svg.setAttribute('preserveAspectRatio', 'none');
    svg.style.width = Math.max(hr, prior) > MAX_TICKS ? `${(Math.max(hr, prior) / MAX_TICKS) * 100}%` : '100%';
    // Draw blue bars (current year, up to displayHr)
    for (let i = 0; i < d; i++) {
      const rect = document.createElementNS(svgNS, 'rect');
      rect.setAttribute('x', i * slotW + slotW * (gapFrac / 2));
      rect.setAttribute('y', barY);
      rect.setAttribute('width', barW);
      rect.setAttribute('height', barH);
      rect.setAttribute('fill', BAR_COLOR);
      svg.appendChild(rect);
    }
    // Draw grey bars (prior year gap — only when fully animated in)
    if (displayHr === undefined || displayHr >= hr) {
      for (let i = hr; i < hr + greyCount; i++) {
        const rect = document.createElementNS(svgNS, 'rect');
        rect.setAttribute('x', i * slotW + slotW * (gapFrac / 2));
        rect.setAttribute('y', barY);
        rect.setAttribute('width', barW);
        rect.setAttribute('height', barH);
        rect.setAttribute('fill', '#3a3a3a');
        svg.appendChild(rect);
      }
    }
    return svg;
  }

  function animateHRGrowIn(sorted, showGrey) {
    const maxHR = Math.max(...sorted.map(p => p.hr), 0);
    const rows = document.querySelectorAll('.player-row');
    const rowMap = {};
    rows.forEach(r => { rowMap[r.dataset.name] = r; });

    function animateGrey() {
      // After blue done, grow in grey bars
      const maxGrey = Math.max(...sorted.map(p => Math.max(0, (p.priorHr || 0) - p.hr)), 0);
      if (maxGrey === 0) return;
      let greyTick = 0;
      const greyTimer = setInterval(() => {
        greyTick++;
        sorted.forEach(p => {
          const gap = Math.max(0, (p.priorHr || 0) - p.hr);
          if (gap === 0) return;
          const row = rowMap[p.name];
          if (!row) return;
          const show = Math.min(greyTick, gap);
          const tickArea = row.querySelector('.tick-area');
          tickArea.innerHTML = '';
          // Draw blue bars fully
          const svgNS = 'http://www.w3.org/2000/svg';
          const totalSlots = Math.max(MAX_TICKS, p.hr, p.priorHr || 0);
          const barH = ROW_H - BAR_PADDING * 2;
          const barY = BAR_PADDING;
          const slotW = 100 / MAX_TICKS;
          const viewW = totalSlots * slotW;
          const gapFrac = 0.18;
          const barW = slotW * (1 - gapFrac);
          const svg = document.createElementNS(svgNS, 'svg');
          svg.setAttribute('viewBox', `0 0 ${viewW} ${ROW_H}`);
          svg.setAttribute('preserveAspectRatio', 'none');
          svg.style.width = Math.max(p.hr, p.priorHr || 0) > MAX_TICKS ? `${(Math.max(p.hr, p.priorHr || 0) / MAX_TICKS) * 100}%` : '100%';
          for (let i = 0; i < p.hr; i++) {
            const rect = document.createElementNS(svgNS, 'rect');
            rect.setAttribute('x', i * slotW + slotW * (gapFrac / 2));
            rect.setAttribute('y', barY);
            rect.setAttribute('width', barW);
            rect.setAttribute('height', barH);
            rect.setAttribute('fill', BAR_COLOR);
            svg.appendChild(rect);
          }
          // Draw grey bars up to current tick
          for (let i = p.hr; i < p.hr + show; i++) {
            const rect = document.createElementNS(svgNS, 'rect');
            rect.setAttribute('x', i * slotW + slotW * (gapFrac / 2));
            rect.setAttribute('y', barY);
            rect.setAttribute('width', barW);
            rect.setAttribute('height', barH);
            rect.setAttribute('fill', '#3a3a3a');
            svg.appendChild(rect);
          }
          tickArea.appendChild(svg);
        });
        if (greyTick >= maxGrey) clearInterval(greyTimer);
      }, 40);
    }

    if (maxHR === 0) {
      animateGrey();
      return;
    }

    let tick = 0;
    const timer = setInterval(() => {
      tick++;
      sorted.forEach(p => {
        const row = rowMap[p.name];
        if (!row) return;
        const show = Math.min(tick, p.hr);
        const tickArea = row.querySelector('.tick-area');
        const countEl = row.querySelector('.hr-count');
        tickArea.innerHTML = '';
        // During blue animation don't show grey yet
        tickArea.appendChild(buildTickSVG(p.hr, show, 0));
        countEl.textContent = show;
      });
      if (tick >= maxHR) {
        clearInterval(timer);
        if (showGrey) setTimeout(animateGrey, 80);
      }
    }, 40);
  }

  function animateSort(newSorted) {
    if (animating) return;
    animating = true;
    const container = document.getElementById('player-list');

      oldPos[r.dataset.name] = r.getBoundingClientRect().top;

    renderList(newSorted, true);
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        container.querySelectorAll('.player-row').forEach(r => {
          const old = oldPos[r.dataset.name];
          if (old === undefined) return;
          const diff = old - r.getBoundingClientRect().top;
          if (diff !== 0) {
            r.style.transition = 'none';
            r.style.transform = `translateY(${diff}px)`;
            requestAnimationFrame(() => {

  // ── Batter sprite animation ──
  function playBatterAnimation(onComplete) {
    const firstRow = document.querySelector('.player-row');
    if (!firstRow) { onComplete(); return; }
    const rowRect = firstRow.getBoundingClientRect();
    const TOTAL_FRAMES = 59;
    const USE_FRAMES = 58;
    const FRAME_W_PRECISE = 40706 / TOTAL_FRAMES;
    const FRAME_W = Math.round(FRAME_W_PRECISE);
    const FRAME_H = 307;
    const displayH = 102;
    const displayW = Math.round(FRAME_W * (displayH / FRAME_H));
    const tickArea = firstRow.querySelector('.tick-area');
    const tickRect = tickArea.getBoundingClientRect();
    const isPortrait = window.innerHeight > window.innerWidth;
    const leftX = Math.round(tickRect.left + (isPortrait ? 15 : 55));
    const bottomY = Math.round(rowRect.bottom + 7);
    const dpr = window.devicePixelRatio || 1;
    const canvas = document.createElement('canvas');
    canvas.width = displayW * dpr;
    canvas.height = displayH * dpr;
    canvas.style.position = 'fixed';
    canvas.style.left = leftX + 'px';
    canvas.style.top = (bottomY - displayH) + 'px';
    canvas.style.width = displayW + 'px';
    canvas.style.height = displayH + 'px';
    canvas.style.pointerEvents = 'none';
    canvas.style.zIndex = '50';
    canvas.style.imageRendering = 'auto';
    document.body.appendChild(canvas);
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    const img = new Image();
    img.src = 'spritesheet.png';
    const FPS = 18;
    const FRAME_DURATION = 1000 / FPS;
    let currentFrame = 0;
    let lastFrameTime = 0;
    let completed = false;
    img.onload = () => {
      function tick(ts) {
        if (completed) return;
        if (!lastFrameTime) lastFrameTime = ts;
        if (ts - lastFrameTime >= FRAME_DURATION) {
          lastFrameTime = ts;
          ctx.clearRect(0, 0, displayW, displayH);
          ctx.globalAlpha = 1;
          ctx.drawImage(img, currentFrame * FRAME_W_PRECISE, 0, FRAME_W_PRECISE, FRAME_H, 0, 0, displayW, displayH);
          currentFrame++;
          if (currentFrame >= USE_FRAMES) {
            completed = true;
            canvas.remove();
            onComplete();
            return;
          }
        }
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    };
    img.onerror = () => { canvas.remove(); onComplete(); };
  }

  function transitionToYear(sorted, year) {

  async function fetchData(year) {
    const priorYear = year - 1;
    const isCurrentYear = year === CURRENT_YEAR;

    // For current year: use same calendar date last year
    // For past years: use full prior season totals
    const today = new Date();
    const month = String(today.getMonth() + 1).padStart(2, '0');
    const day = String(today.getDate()).padStart(2, '0');
    const priorDateStr = `${month}/${day}/${priorYear}`;

    // Fetch current year roster with hitting stats
    const url = `https://statsapi.mlb.com/api/v1/teams/${TEAM_ID}/roster?rosterType=active&season=${year}&hydrate=person(stats(type=season,season=${year},group=hitting))`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('API error');
    const data = await res.json();

    const currentPlayers = (data.roster || [])
      .map(p => {
        const stat = p.person?.stats?.[0]?.splits?.[0]?.stat;
        return {
          name: p.person?.fullName || 'Unknown',
          id: p.person?.id,
          hr: stat?.homeRuns ?? 0,
          pos: p.position?.abbreviation || ''
        };
      })
      .filter(p => {
        if (p.name === 'Shohei Ohtani') return true;
        if (p.pos === 'P') return p.hr >= 1;
        return true;
      });

    // Only fetch prior year stats for current year
    if (isCurrentYear) {
      await Promise.all(currentPlayers.map(async p => {
        try {
          const statUrl = `https://statsapi.mlb.com/api/v1/people/${p.id}/stats?stats=byDateRange&season=${priorYear}&group=hitting&startDate=01/01/${priorYear}&endDate=${priorDateStr}`;
          const statRes = await fetch(statUrl);
          if (statRes.ok) {
            const statData = await statRes.json();
            const splits = statData.stats?.[0]?.splits || [];
            // Take max single split to avoid double-counting trades
            p.priorHr = splits.reduce((max, s) => Math.max(max, s.stat?.homeRuns ?? 0), 0);
          } else {
            p.priorHr = 0;
          }
        } catch(e) {
          p.priorHr = 0;
        }
      }));
    }

    return currentPlayers.map(({ name, hr, priorHr }) => ({
      name,
      hr,
      priorHr: priorHr || 0
    }));
  }

  async function loadYear(year, initial) {
    const statusEl = document.getElementById('status-msg');
    const updEl = document.getElementById('last-updated');
    try {
      const data = await fetchData(year);
      if (data && data.length > 0) {
        players = data;
        dataLoaded = true;
        statusEl.textContent = '';
        if (year === CURRENT_YEAR) {
          updEl.textContent = formatTime(new Date());
          updEl.style.display = '';
        } else {
          updEl.textContent = '';
          updEl.style.display = 'none';
        }
        const sorted = sortPlayers(players, sortMode);
        if (initial) {
          renderList(sorted, false);
          const container = document.getElementById('player-list');
          container.style.opacity = '1';
          container.style.transform = 'translateY(0)';
          if (year === CURRENT_YEAR) {
            playBatterAnimation(() => { animateHRGrowIn(sorted, true); });
          } else {
            animateHRGrowIn(sorted, false);
          }
        } else {
          transitionToYear(sorted, year);
        }
        if (year === CURRENT_YEAR) {
          pollTimer = setInterval(() => refreshCurrentYear(), POLL_MS);
        }
      }
    } catch (e) {
      if (!dataLoaded) statusEl.textContent = 'Could not connect. Retrying…';
    }
  }

  async function refreshCurrentYear() {
    if (selectedYear !== CURRENT_YEAR) return;
    try {
      const data = await fetchData(CURRENT_YEAR);
      if (data && data.length > 0) {
        players = data;
        document.getElementById('last-updated').textContent = formatTime(new Date());
        renderList(sortPlayers(players, sortMode), true);
      }
    } catch (e) {}
  }

  // ── OPS functions ──
  function buildOPSScale() {
    const bar = document.getElementById('ops-bar');
    const labels = document.getElementById('ops-labels');
    bar.innerHTML = '';
    labels.innerHTML = '';

    const MAX_OPS = 1.2;
    const segments = [
      { from: 0,     to: 0.650, color: '#d51920' },
      { from: 0.650, to: 0.750, color: '#fcb035' },
      { from: 0.750, to: 0.900, color: '#e8e613' },
      { from: 0.900, to: 1.000, color: '#78c043' },
      { from: 1.000, to: MAX_OPS, color: '#4b8d24' },
    ];

    segments.forEach(s => {
      const seg = document.createElement('div');
      seg.className = 'ops-segment';
      seg.style.width = `${((s.to - s.from) / MAX_OPS) * 100}%`;
      seg.style.background = s.color;
      bar.appendChild(seg);
    });

    // Labels
    const labelData = [
      { val: '.0',    pos: 0 },
      { val: '.650',  pos: 0.650 / MAX_OPS },
      { val: '.750',  pos: 0.750 / MAX_OPS },
      { val: '.900',  pos: 0.900 / MAX_OPS },
      { val: '1.000', pos: 1.000 / MAX_OPS },
    ];
    labelData.forEach(l => {
      const lbl = document.createElement('div');
      lbl.className = 'ops-label';
      lbl.textContent = l.val;
      lbl.style.left = `${l.pos * 100}%`;
      labels.appendChild(lbl);
    });
  }

  async function fetchOPS(year) {
    const url = `https://statsapi.mlb.com/api/v1/teams/${TEAM_ID}/roster?rosterType=active&season=${year}&hydrate=person(stats(type=season,season=${year},group=hitting))`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    return (data.roster || [])
      .map(p => {
        const stat = p.person?.stats?.[0]?.splits?.[0]?.stat;
        const obp = stat?.obp ?? 0;
        const slg = stat?.slg ?? 0;
        const ops = Math.round((obp + slg) * 1000) / 1000;
        return {
          name: p.person?.fullName || 'Unknown',
          ops,
          pos: p.position?.abbreviation || '',
          ab: stat?.atBats ?? 0
        };
      })
      .filter(p => {
        if (p.name === 'Shohei Ohtani') return true;
        if (p.pos === 'P') return false;
        return p.ab >= 10; // minimum AB to show
      })
      .sort((a, b) => b.ops - a.ops);
  }

  let opsSortMode = 'most';

  function renderOPSList(players) {
    const list = document.getElementById('ops-list');
    list.innerHTML = '';
    const MAX_OPS = 1.2;
    const BAR_PAD = 3; // same gap as HR bars

    players.forEach(p => {
      const row = document.createElement('div');
      row.className = 'ops-row';
      row.dataset.name = p.name;

      const nameEl = document.createElement('div');
      nameEl.className = 'ops-name';
      nameEl.textContent = p.name;

      const track = document.createElement('div');
      track.className = 'ops-track';

      // Vertical dividers at threshold positions (with gap — same as BAR_PADDING)
      const thresholds = [0.650, 0.750, 0.900, 1.000];
      thresholds.forEach(t => {
        const div = document.createElement('div');
        div.className = 'ops-divider';
        div.style.left = `${(t / MAX_OPS) * 100}%`;
        track.appendChild(div);
      });

      // Dot
      if (p.ab >= 10) {
        const dot = document.createElement('div');
        dot.className = 'ops-dot';
        dot.style.background = getOPSColor(p.ops);
        const pct = Math.min(p.ops / MAX_OPS, 0.98); // cap at right edge
        dot.style.left = `${pct * 100}%`;
        track.appendChild(dot);
      }

      const valueEl = document.createElement('div');
      valueEl.className = 'ops-value';
      valueEl.textContent = p.ops > 0 ? p.ops.toFixed(3).replace(/^0/, '') : '—';

      row.appendChild(nameEl);
      row.appendChild(track);
      row.appendChild(valueEl);
      list.appendChild(row);
    });

    // Tap name to sort
    list.querySelectorAll('.ops-name').forEach(nameEl => {
      nameEl.addEventListener('click', () => {
        opsSortMode = opsSortMode === 'most' ? 'alpha' : 'most';
        const sorted = opsSortMode === 'most'
          ? [...opsPlayers].sort((a,b) => b.ops - a.ops)
          : [...opsPlayers].sort((a,b) => a.name.localeCompare(b.name));
        renderOPSList(sorted);
      });
    });
  }

  let opsPlayers = [];

  async function loadOPS(year) {
    try {
      buildOPSScale();
      const data = await fetchOPS(year);
      opsPlayers = data;
      opsSortMode = 'most';
      renderOPSList(opsPlayers);
    } catch(e) {}
  }

  // ── Boot ──
  document.getElementById('year-btn').textContent = CURRENT_YEAR;
  const container = document.getElementById('player-list');
  container.style.opacity = '0';
  loadYear(CURRENT_YEAR, true);
</script>
</body>
</html>
