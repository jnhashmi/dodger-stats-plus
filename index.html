<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Stats+">
  <meta name="theme-color" content="#000000">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <title>Dodger Home Runs</title>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      background: #000;
      color: #fff;
      font-family: 'Bricolage Grotesque', -apple-system, 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; -ms-overflow-style: none; }

    /* ── Sticky header bar ── */
    #header-bar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #000;
      padding-top: max(env(safe-area-inset-top), 20px);
      padding-left: max(env(safe-area-inset-left), 24px);
      padding-right: max(env(safe-area-inset-right), 24px);
      padding-bottom: 12px;
    }

    html, body {
      height: 100%;
      background: #000;
      color: #fff;
      font-family: 'Bricolage Grotesque', -apple-system, 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    #app {
      min-height: 100vh;
      min-height: -webkit-fill-available;
      display: flex;
      flex-direction: column;
    }

    #inner {
      padding-left: max(env(safe-area-inset-left), 24px);
      padding-right: max(env(safe-area-inset-right), 24px);
      padding-bottom: max(env(safe-area-inset-bottom), 40px);
      flex: 1;
    }

    /* ── Header ── */
    #header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }


    #title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.1px;
      color: #fff;
      font-family: 'Bricolage Grotesque', sans-serif;
      white-space: nowrap;
    }

    #dodger-logo {
      height: calc(28px * 1.13);
      width: auto;
      display: none;
      vertical-align: baseline;
      position: relative;
      top: 3px;
    }

    #home-runs-label {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      font-family: 'Bricolage Grotesque', sans-serif;
      white-space: nowrap;
      display: none;
      margin-left: 11px;
    }

    #ws-label {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      font-family: 'Bricolage Grotesque', sans-serif;
      white-space: nowrap;
      display: none;
      margin-left: 11px;
    }

    #ops-label {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      font-family: 'Bricolage Grotesque', sans-serif;
      white-space: nowrap;
      display: none;
      margin-left: 11px;
    }

    #year-btn {
      font-size: 18px;
      font-weight: 700;
      font-family: 'Bricolage Grotesque', sans-serif;
      color: #fff;
      background: none;
      border: 0.5px solid #6e6e6e;
      border-radius: 4px;
      padding: 2px 8px;
      cursor: pointer;
      transition: border-color 0.15s;
      line-height: 1.4;
    }
    #year-btn:active { border-color: #aaa; }

    /* WS tally */
    #ws-tally {
      font-size: 18px;
      font-weight: 400;
      color: #fff;
      font-family: 'Bricolage Grotesque', sans-serif;
      white-space: nowrap;
      display: none;
    }

    /* WS clear button — same height as year-btn */
    #ws-clear-btn {
      font-size: 18px;
      font-weight: 700;
      font-family: 'Bricolage Grotesque', sans-serif;
      color: #fff;
      background: none;
      border: 0.5px solid #6e6e6e;
      border-radius: 4px;
      padding: 2px 12px;
      cursor: pointer;
      display: none;
      line-height: 1.4;
      flex-shrink: 0;
      white-space: nowrap;
      vertical-align: middle;
    }
    #ws-clear-btn:active { opacity: 0.6; }

    #header-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    #last-updated {
      font-size: 11px;
      color: #666;
      font-family: 'Bricolage Grotesque', sans-serif;
      white-space: nowrap;
    }

    /* Home plate nav button — flush to right edge */
    #home-btn {
      position: fixed;
      z-index: 9999;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px; /* larger tap target */
      margin-right: -8px;
      margin-top: -8px; /* compensate padding so visual position unchanged */
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s;
      right: max(env(safe-area-inset-right), 24px);
      top: max(env(safe-area-inset-top), 20px);
      -webkit-tap-highlight-color: transparent;
    }
    #home-btn:active { opacity: 0.5; }

    /* ── Year dropdown overlay ── */
    #year-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 100;
      background: rgba(0,0,0,0.7);
    }
    #year-overlay.open { display: block; }

    #year-dropdown {
      position: absolute;
      background: #0a0a0a;
      border: 0.5px solid #6e6e6e;
      border-radius: 6px;
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior: contain;
      max-height: 70vh;
      width: 140px;
    }

    .year-option {
      display: block;
      width: 100%;
      padding: 10px 8px 10px 49px;
      font-size: 18px;
      font-weight: 700;
      font-family: 'Bricolage Grotesque', sans-serif;
      color: #fff;
      background: none;
      border: none;
      border-bottom: 0.5px solid #222;
      text-align: left;
      cursor: pointer;
      transition: background 0.1s;
    }
    .year-option:last-child { border-bottom: none; }
    .year-option:active { background: #1a1a1a; }
    .year-option.active { color: #0977cc; }

    /* ── Screens ── */
    #hr-screen { display: block; }
    #ws-screen { display: none; }

    /* ── HR Player list ── */
    #player-list {
      width: 100%;
      margin-top: 1.5em;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .player-row {
      display: flex;
      align-items: center;
      border-bottom: 0.5px solid #6e6e6e;
      gap: 14px;
      will-change: transform;
      height: 40px;
    }

    .player-name {
      font-size: 18px;
      font-weight: 400;
      color: #fff;
      width: 190px;
      min-width: 190px;
      white-space: nowrap;
      font-family: 'Bricolage Grotesque', sans-serif;
      letter-spacing: -0.1px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .tick-area {
      flex: 1;
      height: 100%;
      min-width: 0;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
    }

    .tick-area svg {
      display: block;
      height: 100%;
    }

    .hr-count {
      font-size: 18px;
      font-weight: 400;
      color: #fff;
      min-width: 32px;
      text-align: right;
      font-family: 'Bricolage Grotesque', sans-serif;
      flex-shrink: 0;
    }

    /* ── World Series list ── */
    #ws-list {
      width: 100%;
      margin-top: 0;
    }

    .ws-row {
      display: flex;
      align-items: center;
      border-bottom: 0.5px solid #6e6e6e;
      height: 40px;
      gap: 14px;
      cursor: pointer;
    }

    .ws-year {
      font-size: 18px;
      font-weight: 400;
      color: #fff;
      width: 60px;
      min-width: 60px;
      font-family: 'Bricolage Grotesque', sans-serif;
      flex-shrink: 0;
    }

    .ws-team {
      font-size: 18px;
      font-weight: 400;
      font-family: 'Bricolage Grotesque', sans-serif;
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    .ws-team.revealed { opacity: 1; }

    .ws-col-label { display: none; }
    @media (orientation: landscape) {
      .ws-col-label { display: inline; }
    }

    /* vs. label — landscape only */
    .ws-vs {
      display: none;
      font-size: 13px;
      font-weight: 700;
      color: #707070;
      font-family: 'Bricolage Grotesque', sans-serif;
      letter-spacing: 0.05em;
      white-space: nowrap;
      min-width: 40px;
      text-align: center;
    }

    .ws-loser {
      display: none;
      min-width: 200px;
    }

    .ws-loser-tap {
      display: none;
      flex: 1;
      height: 100%;
      align-items: center;
      cursor: pointer;
      min-height: 40px;
    }

    @media (orientation: landscape) {
      .ws-vs { display: block; }
      .ws-loser { display: block; }
      .ws-loser-tap { display: flex; }
      .ws-row { position: relative; }
    }

    /* ── Misc ── */
    #status-msg {
      font-family: 'Bricolage Grotesque', sans-serif;
      color: #444;
      font-size: 13px;
      text-align: center;
      margin-top: 48px;
    }

    #portrait-note {
      display: none;
      font-family: 'Bricolage Grotesque', sans-serif;
      color: #797878;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-align: center;
      margin-top: 32px;
      text-transform: uppercase;
    }

    #version {
      display: block;
      font-family: 'Bricolage Grotesque', sans-serif;
      color: #797878;
      font-size: 11px;
      text-align: center;
      margin-top: 8px;
    }

    #title-text { display: none; }

    @media (orientation: landscape) {
      #dodger-logo { display: inline-block; }
      #home-runs-label { display: inline-block; }
      body.ws-mode .ws-year { min-width: 140px; width: 140px; }
      body.ws-mode .ws-row {
        display: flex;
        align-items: center;
        gap: 0;
      }
      body.ws-mode .ws-team:not(.ws-loser) {
        min-width: 220px;
        width: 220px;
      }
      body.ws-mode .ws-vs {
        min-width: 60px;
        text-align: center;
      }
      body.ws-mode .ws-loser-tap {
        margin-left: 60px;
      }
    }

    @media (orientation: portrait) {
      #title-text { display: inline; }
      #dodger-logo { display: none !important; }
      #home-runs-label { display: none !important; }
      #header-left { align-items: baseline; }
      #ws-label { margin-left: 0; font-size: 15px; font-weight: 700; line-height: 1.4; }
      #ops-label { margin-left: 0; font-size: 15px; font-weight: 700; line-height: 1.4; }
      #title { font-size: 15px; line-height: 1.4; }
      #year-btn { font-size: 15px; padding: 2px 8px; }
      #ws-tally { font-size: 15px; font-weight: 400; line-height: 1.4; }
      #ws-clear-btn { font-size: 15px; padding: 2px 8px; }
      .player-name { font-size: 15px; width: 130px; min-width: 130px; }
      .hr-count { font-size: 15px; min-width: 24px; }
      .ws-year { font-size: 15px; }
      .ws-team { font-size: 15px; }
      .ops-name { font-size: 15px !important; width: 130px !important; min-width: 130px !important; }
      .ops-value { font-size: 15px !important; }
      .ops-row { gap: 14px; }
      #ops-bar { left: 144px !important; right: 40px !important; }
      #ops-labels { left: 144px; display: none; }
      #portrait-note { display: block; }
      .year-option { font-size: 15px; }
      #header { padding-bottom: 2px; }
    }

    /* ── Nav overlay — display:none when closed, nothing renders ── */
    #nav-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 50;
      background: rgba(0,0,0,0.4);
    }
    #nav-overlay.open { display: block; }

    /* Nav panel — absolute inside overlay */
    #nav-panel {
      position: absolute;
      background: #0977cc;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    /* Landscape: slides in from right with animation */
    @media (orientation: landscape) {
      #nav-panel {
        top: 0; right: 0; bottom: 0;
        width: 42%;
        padding-left: 32px;
        padding-right: max(env(safe-area-inset-right), 24px);
        padding-bottom: 40px;
        transform: translateX(110%);
        transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      }
      #nav-overlay.open #nav-panel { transform: translateX(0); }
    }

    /* Portrait: slides in from right, safe-area-cover masks the blue bleed */
    @media (orientation: portrait) {
      #nav-panel {
        top: 0; left: 0; right: 0;
        bottom: auto;
        padding-top: 0;
        padding-left: max(env(safe-area-inset-left), 24px);
        padding-right: max(env(safe-area-inset-right), 24px);
        padding-bottom: 32px;
        transform: translateY(-100%);
        transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        align-items: flex-start;
      }
      #nav-overlay.open #nav-panel { transform: translateY(0); }
    }

    /* Safe area cover — black bar instantly covers blue safe area in portrait when nav opens */
    #safe-area-cover {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      height: env(safe-area-inset-top, 50px);
      background: #000;
      z-index: 9999;
      pointer-events: none;
    }

    /* Nav buttons */
    #nav-panel { gap: 0; }

    .nav-btn-row {
      height: 46px;
      display: flex;
      align-items: center;
    }
    /* 20px gap between rows using margin-top on all but first */
    /* Nav button spacing — consistent in both orientations */
    .nav-btn-row + .nav-btn-row {
      margin-top: 10px;
    }

    @media (orientation: portrait) {
      .nav-btn-row + .nav-btn-row {
        margin-top: 4px;
      }
      /* Preserve divider spacing in portrait */
      .nav-divider {
        margin: 20px 0;
      }
    }

    /* Black divider bar — 1px, width matched to buttons by JS */
    .nav-divider {
      height: 1px;
      background: #000;
      margin: 20px 0;
    }

    .nav-btn-row {
      height: 46px;
      display: flex;
      align-items: center;
    }

    .nav-btn {
      font-size: 18px;
      font-weight: 700;
      font-family: 'Bricolage Grotesque', sans-serif;
      color: #fff;
      background: none;
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 4px;
      padding: 2px 20px; /* 20px left/right padding */
      cursor: pointer;
      text-align: left;
      line-height: 1.4;
      white-space: nowrap;
      transition: background 0.1s;
      display: inline-block;
      width: auto;
    }
    .nav-btn:active { background: rgba(255,255,255,0.15); }

    @media (orientation: landscape) {
      #nav-btn-container { display: contents; }
    }

    @media (orientation: portrait) {
      #nav-btn-container { display: contents; }
      #nav-panel {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
      }
    }

    /* ── OPS screen ── */
    #ops-screen { display: none; }

    /* OPS scale — absolutely positioned, doesn't affect flow */
    #ops-scale {
      position: absolute;
      left: 0; right: 0;
      height: 40px;
      top: 0;
      pointer-events: none;
    }

    /* ops-list padding-top reserves space for scale row */
    #ops-list {
      padding-top: 40px;
      margin-top: 0;
    }

    /* The color bar — left edge aligns with tick area (name col + gap) */
    #ops-bar {
      position: absolute;
      left: 204px; /* 190px name col + 14px gap */
      right: 48px;
      bottom: 1px;
      top: auto;
      transform: none;
      height: 4px;
      display: flex;
      gap: 5px;
      overflow: visible;
    }

    .ops-segment {
      height: 100%;
      flex-shrink: 0;
    }

    /* Labels — left-aligned, matching bar position */
    #ops-labels {
      position: absolute;
      left: 204px;
      right: 48px;
      bottom: 10px;
      top: 0;
      pointer-events: none;
    }

    .ops-label {
      position: absolute;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Bricolage Grotesque', sans-serif;
      color: #797878;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transform: none; /* left-aligned, not centered */
      bottom: 0;
      line-height: 1;
    }

    /* Vertical divider lines — top 3px matches bar bottom position */
    .ops-divider {
      position: absolute;
      top: 3px;
      bottom: 3px;
      width: 0.5px;
      background: #6e6e6e;
      pointer-events: none;
    }

    /* OPS player rows */
    .ops-row {
      display: flex;
      align-items: center;
      border-bottom: 0.5px solid #6e6e6e;
      gap: 14px;
      height: 40px;
      position: relative;
    }

    .ops-name {
      font-size: 18px;
      font-weight: 400;
      color: #fff;
      width: 190px;
      min-width: 190px;
      white-space: nowrap;
      font-family: 'Bricolage Grotesque', sans-serif;
      letter-spacing: -0.1px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .ops-track {
      flex: 1;
      height: 100%;
      position: relative;
      min-width: 0;
    }

    .ops-dot {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    .ops-value {
      font-size: 18px;
      font-weight: 400;
      color: #fff;
      min-width: 48px;
      text-align: right;
      font-family: 'Bricolage Grotesque', sans-serif;
      flex-shrink: 0;
    }

    #vin-label {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      font-family: 'Bricolage Grotesque', sans-serif;
      white-space: nowrap;
      display: none;
      margin-left: 11px;
    }


    /* ── Vin Scully screen — base (no orientation) ── */
    #vin-screen { display: none; }

    .vin-diamond {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .vin-diamond svg { display: block; }
    .vin-cell.has-clip { cursor: pointer; }
    .vin-cell.empty { cursor: default; }

    #ps-label {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      font-family: 'Bricolage Grotesque', sans-serif;
      white-space: nowrap;
      display: none;
      margin-left: 11px;
    }

    /* ── Postseason screen — hidden by default ── */
    #ps-screen { display: none; }

    /* ps-mode — explicitly hide ALL other screens and show only ps */
    body.ps-mode #year-btn { display: none; }
    body.ps-mode #last-updated { display: none; }
    body.ps-mode #ps-label { display: inline-block; }
    body.ps-mode #home-runs-label { display: none !important; }
    body.ps-mode #title-text { display: none !important; }
    body.ps-mode #dodger-logo { display: inline-block; }
    body.ps-mode #hr-screen { display: none !important; }
    body.ps-mode #ws-screen { display: none !important; }
    body.ps-mode #ops-screen { display: none !important; }
    body.ps-mode #vin-screen { display: none !important; }
    body.ps-mode #ps-screen { display: block; }
    body.ps-mode #portrait-note { display: none !important; }
    body.ps-mode #ws-tally { display: none; }
    body.ps-mode #ws-clear-btn { display: none; }
    body.ps-mode #ws-label { display: none; }
    body.ps-mode #ops-label { display: none; }
    body.ps-mode #vin-label { display: none; }

    @media (orientation: portrait) {
      body.ps-mode #dodger-logo { display: none !important; }
      body.ps-mode #ps-label { display: inline-block !important; font-size: 15px !important; margin-left: 0 !important; }
      body.ps-mode #title { display: none; }
    }

    /* Postseason table layout */
    #ps-list { width: 100%; }
    body.vin-mode #year-btn { display: none; }
    body.vin-mode #last-updated { display: none; }
    body.vin-mode #vin-label { display: inline-block; }
    body.vin-mode #home-runs-label { display: none !important; }
    body.vin-mode #title-text { display: none !important; }
    body.vin-mode #dodger-logo { display: inline-block; }
    body.vin-mode #hr-screen { display: none; }
    body.vin-mode #ws-screen { display: none; }
    body.vin-mode #ops-screen { display: none; }
    body.vin-mode #ps-screen { display: none !important; }
    body.vin-mode #portrait-note { display: none !important; }
    body.vin-mode #ws-tally { display: none; }
    body.vin-mode #ws-clear-btn { display: none; }
    body.vin-mode #ws-label { display: none; }
    body.vin-mode #ops-label { display: none; }

    /* ── Portrait ── */
    @media (orientation: portrait) {
      body.vin-mode #vin-screen {
        display: block;
      }
      body.vin-mode #dodger-logo { display: none !important; }
      body.vin-mode #vin-label { display: inline-block !important; font-size: 15px !important; margin-left: 0 !important; }
      body.vin-mode #title { display: none; }

      /* Photo */
      #vin-photo-wrap { display: block; }
      #vin-photo {
        display: block;
        width: auto;
        height: 180px;
        max-width: 100%;
        object-fit: cover;
        object-position: center top;
        margin: 1.5em auto 0;
      }

      /* Scorecard */
      #vin-grid-wrap {
        width: 220px;
        max-width: 220px;
        margin: 34px auto 0;
        margin-left: calc(50% - 110px - 6px);
        position: relative;
        overflow: visible;
      }
      #vin-grid {
        width: 220px;

  function formatTime(d) {

  function sortPlayers(list, mode) {
    const copy = [...list];
    if (mode === 'most') {
      copy.sort((a, b) => b.hr - a.hr || a.name.localeCompare(b.name));
    } else {
      copy.sort((a, b) => a.name.localeCompare(b.name));
    }
    return copy;
  }

  function buildTickSVG(hr, displayHr, priorHr) {
    const d = displayHr !== undefined ? displayHr : hr;
    const prior = priorHr || 0;
    // Grey bars show when prior year pace exceeds current — only the gap above current
    const greyCount = prior > hr ? prior - hr : 0;
    const totalSlots = Math.max(MAX_TICKS, hr, prior);
    const barH = ROW_H - BAR_PADDING * 2;
    const barY = BAR_PADDING;
    const slotW = 100 / MAX_TICKS;
    const viewW = totalSlots * slotW;
    const gapFrac = 0.18;
    const barW = slotW * (1 - gapFrac);
    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('viewBox', `0 0 ${viewW} ${ROW_H}`);
    svg.setAttribute('preserveAspectRatio', 'none');
    svg.style.width = Math.max(hr, prior) > MAX_TICKS ? `${(Math.max(hr, prior) / MAX_TICKS) * 100}%` : '100%';
    // Draw blue bars (current year, up to displayHr)
    for (let i = 0; i < d; i++) {
      const rect = document.createElementNS(svgNS, 'rect');
      rect.setAttribute('x', i * slotW + slotW * (gapFrac / 2));
      rect.setAttribute('y', barY);
      rect.setAttribute('width', barW);
      rect.setAttribute('height', barH);
      rect.setAttribute('fill', BAR_COLOR);
      svg.appendChild(rect);
    }
    // Draw grey bars (prior year gap — only when fully animated in)
    if (displayHr === undefined || displayHr >= hr) {
      for (let i = hr; i < hr + greyCount; i++) {
        const rect = document.createElementNS(svgNS, 'rect');
        rect.setAttribute('x', i * slotW + slotW * (gapFrac / 2));
        rect.setAttribute('y', barY);
        rect.setAttribute('width', barW);
        rect.setAttribute('height', barH);
        rect.setAttribute('fill', '#3a3a3a');
        svg.appendChild(rect);
      }
    }
    return svg;
  }

  function renderList(sorted, instant) {
    const container = document.getElementById('player-list');
    container.innerHTML = '';
    sorted.forEach(p => {
      const row = document.createElement('div');

      tickArea.className = 'tick-area';
      tickArea.appendChild(buildTickSVG(p.hr, instant ? p.hr : 0, p.priorHr || 0));
      const countEl = document.createElement('div');
      countEl.className = 'hr-count';
      countEl.textContent = instant ? p.hr : 0;
      row.appendChild(nameEl);
      row.appendChild(tickArea);
      row.appendChild(countEl);

  function animateHRGrowIn(sorted, showGrey) {
    const maxHR = Math.max(...sorted.map(p => p.hr), 0);
    const rows = document.querySelectorAll('.player-row');
    const rowMap = {};
    rows.forEach(r => { rowMap[r.dataset.name] = r; });

    function animateGrey() {
      // After blue done, grow in grey bars
      const maxGrey = Math.max(...sorted.map(p => Math.max(0, (p.priorHr || 0) - p.hr)), 0);
      if (maxGrey === 0) return;
      let greyTick = 0;
      const greyTimer = setInterval(() => {
        greyTick++;
        sorted.forEach(p => {
          const gap = Math.max(0, (p.priorHr || 0) - p.hr);
          if (gap === 0) return;
          const row = rowMap[p.name];
          if (!row) return;
          const show = Math.min(greyTick, gap);
          const tickArea = row.querySelector('.tick-area');
          tickArea.innerHTML = '';
          // Draw blue bars fully
          const svgNS = 'http://www.w3.org/2000/svg';
          const totalSlots = Math.max(MAX_TICKS, p.hr, p.priorHr || 0);
          const barH = ROW_H - BAR_PADDING * 2;
          const barY = BAR_PADDING;
          const slotW = 100 / MAX_TICKS;
          const viewW = totalSlots * slotW;
          const gapFrac = 0.18;
          const barW = slotW * (1 - gapFrac);
          const svg = document.createElementNS(svgNS, 'svg');
          svg.setAttribute('viewBox', `0 0 ${viewW} ${ROW_H}`);
          svg.setAttribute('preserveAspectRatio', 'none');
          svg.style.width = Math.max(p.hr, p.priorHr || 0) > MAX_TICKS ? `${(Math.max(p.hr, p.priorHr || 0) / MAX_TICKS) * 100}%` : '100%';
          for (let i = 0; i < p.hr; i++) {
            const rect = document.createElementNS(svgNS, 'rect');
            rect.setAttribute('x', i * slotW + slotW * (gapFrac / 2));
            rect.setAttribute('y', barY);
            rect.setAttribute('width', barW);
            rect.setAttribute('height', barH);
            rect.setAttribute('fill', BAR_COLOR);
            svg.appendChild(rect);
          }
          // Draw grey bars up to current tick
          for (let i = p.hr; i < p.hr + show; i++) {
            const rect = document.createElementNS(svgNS, 'rect');
            rect.setAttribute('x', i * slotW + slotW * (gapFrac / 2));
            rect.setAttribute('y', barY);
            rect.setAttribute('width', barW);
            rect.setAttribute('height', barH);
            rect.setAttribute('fill', '#3a3a3a');
            svg.appendChild(rect);
          }
          tickArea.appendChild(svg);
        });
        if (greyTick >= maxGrey) clearInterval(greyTimer);
      }, 40);
    }

    if (maxHR === 0) {
      animateGrey();
      return;
    }

    let tick = 0;
    const timer = setInterval(() => {
      tick++;
      sorted.forEach(p => {
        const row = rowMap[p.name];
        if (!row) return;
        const show = Math.min(tick, p.hr);
        const tickArea = row.querySelector('.tick-area');
        const countEl = row.querySelector('.hr-count');
        tickArea.innerHTML = '';
        // During blue animation don't show grey yet
        tickArea.appendChild(buildTickSVG(p.hr, show, 0));
        countEl.textContent = show;
      });
      if (tick >= maxHR) {
        clearInterval(timer);
        if (showGrey) setTimeout(animateGrey, 80);
      }
    }, 40);
  }

  function animateSort(newSorted) {
    if (animating) return;
    animating = true;
    const container = document.getElementById('player-list');
    const oldPos = {};
    container.querySelectorAll('.player-row').forEach(r => {
      oldPos[r.dataset.name] = r.getBoundingClientRect().top;
    });
    renderList(newSorted, true);
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        container.querySelectorAll('.player-row').forEach(r => {
          const old = oldPos[r.dataset.name];
          if (old === undefined) return;
          const diff = old - r.getBoundingClientRect().top;
          if (diff !== 0) {
            r.style.transition = 'none';
            r.style.transform = `translateY(${diff}px)`;
            requestAnimationFrame(() => {
              r.style.transition = 'transform 0.45s cubic-bezier(0.4, 0, 0.2, 1)';
              r.style.transform = '';
            });
          }
        });
        setTimeout(() => { animating = false; }, 500);
      });
    });
  }

  // ── Batter sprite animation ──
  function playBatterAnimation(onComplete) {
    if (currentScreen !== 'hr') { onComplete(); return; }
    const firstRow = document.querySelector('.player-row');
    if (!firstRow) { onComplete(); return; }
    const rowRect = firstRow.getBoundingClientRect();
    const TOTAL_FRAMES = 59;
    const USE_FRAMES = 58;
    const FRAME_W_PRECISE = 40706 / TOTAL_FRAMES;
    const FRAME_W = Math.round(FRAME_W_PRECISE);
    const FRAME_H = 307;
    const displayH = 102;
    const displayW = Math.round(FRAME_W * (displayH / FRAME_H));
    const tickArea = firstRow.querySelector('.tick-area');
    const tickRect = tickArea.getBoundingClientRect();
    const isPortrait = window.innerHeight > window.innerWidth;
    const leftX = Math.round(tickRect.left + (isPortrait ? 15 : 55));
    const bottomY = Math.round(rowRect.bottom + 7);
    const dpr = window.devicePixelRatio || 1;
    const canvas = document.createElement('canvas');
    canvas.width = displayW * dpr;
    canvas.height = displayH * dpr;
    canvas.style.position = 'fixed';
    canvas.style.left = leftX + 'px';
    canvas.style.top = (bottomY - displayH) + 'px';
    canvas.style.width = displayW + 'px';
    canvas.style.height = displayH + 'px';
    canvas.style.pointerEvents = 'none';
    canvas.style.zIndex = '50';
    canvas.style.imageRendering = 'auto';
    document.body.appendChild(canvas);
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    const img = new Image();
    img.src = 'spritesheet.png';
    const FPS = 18;
    const FRAME_DURATION = 1000 / FPS;
    let currentFrame = 0;
    let lastFrameTime = 0;
    let completed = false;
    img.onload = () => {
      function tick(ts) {
        if (completed) return;
        if (!lastFrameTime) lastFrameTime = ts;
        if (ts - lastFrameTime >= FRAME_DURATION) {
          lastFrameTime = ts;
          ctx.clearRect(0, 0, displayW, displayH);
          ctx.globalAlpha = 1;
          ctx.drawImage(img, currentFrame * FRAME_W_PRECISE, 0, FRAME_W_PRECISE, FRAME_H, 0, 0, displayW, displayH);
          currentFrame++;
          if (currentFrame >= USE_FRAMES) {
            completed = true;
            canvas.remove();
            onComplete();
            return;
          }
        }
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    };
    img.onerror = () => { canvas.remove(); onComplete(); };
  }

  function transitionToYear(sorted, year) {
    const container = document.getElementById('player-list');
    container.style.transition = 'opacity 0.2s ease, transform 0.2s ease';

  async function fetchData(year) {
    const priorYear = year - 1;
    const isCurrentYear = year === CURRENT_YEAR;

    // For current year: use same calendar date last year
    // For past years: use full prior season totals
    const today = new Date();
    const month = String(today.getMonth() + 1).padStart(2, '0');
    const day = String(today.getDate()).padStart(2, '0');
    const priorDateStr = `${month}/${day}/${priorYear}`;

    // Fetch current year roster with hitting stats
    const url = `https://statsapi.mlb.com/api/v1/teams/${TEAM_ID}/roster?rosterType=40Man&season=${year}&hydrate=person(stats(type=season,season=${year},group=hitting))`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('API error');
    const data = await res.json();

    const currentPlayers = (data.roster || [])
      .map(p => {
        const stat = p.person?.stats?.[0]?.splits?.[0]?.stat;
        return {
          name: p.person?.fullName || 'Unknown',
          id: p.person?.id,
          hr: stat?.homeRuns ?? 0,
          pos: p.position?.abbreviation || '',
          ab: parseInt(stat?.atBats) || 0,
          pa: parseInt(stat?.plateAppearances) || 0,
        };
      })
      .filter(p => {
        if (p.name === 'Shohei Ohtani') return true;
        if (p.pos === 'P') return p.hr >= 1;
        return p.pa >= 1; // at least 1 plate appearance
      });

    // Only fetch prior year stats for current year
    if (isCurrentYear) {
      await Promise.all(currentPlayers.map(async p => {
        try {
          const statUrl = `https://statsapi.mlb.com/api/v1/people/${p.id}/stats?stats=byDateRange&season=${priorYear}&group=hitting&startDate=01/01/${priorYear}&endDate=${priorDateStr}`;
          const statRes = await fetch(statUrl);
          if (statRes.ok) {
            const statData = await statRes.json();
            const splits = statData.stats?.[0]?.splits || [];
            // Take max single split to avoid double-counting trades
            p.priorHr = splits.reduce((max, s) => Math.max(max, s.stat?.homeRuns ?? 0), 0);
          } else {
            p.priorHr = 0;
          }
        } catch(e) {
          p.priorHr = 0;
        }
      }));
    }

    return currentPlayers.map(({ name, hr, priorHr }) => ({
      name,
      hr,
      priorHr: priorHr || 0
    }));
  }

  async function loadYear(year, initial) {
    const statusEl = document.getElementById('status-msg');
    const updEl = document.getElementById('last-updated');
    try {
      const data = await fetchData(year);
      if (data && data.length > 0) {
        players = data;
        loadedHRYear = year;
        dataLoaded = true;
        statusEl.textContent = '';
        if (year === CURRENT_YEAR) {
          updEl.textContent = formatTime(new Date());
          updEl.style.display = '';
        } else {
          updEl.textContent = '';
          updEl.style.display = 'none';
        }
        const sorted = sortPlayers(players, sortMode);
        if (initial) {
          renderList(sorted, false);
          const container = document.getElementById('player-list');
          container.style.opacity = '1';
          container.style.transform = 'translateY(0)';
          if (year === CURRENT_YEAR) {
            playBatterAnimation(() => { animateHRGrowIn(sorted, true); });
          } else {
            animateHRGrowIn(sorted, false);
          }
        } else {
          transitionToYear(sorted, year);
        }
        if (year === CURRENT_YEAR) {
          pollTimer = setInterval(() => refreshCurrentYear(), POLL_MS);
        }
      }
    } catch (e) {
      if (!dataLoaded) statusEl.textContent = 'Could not connect. Retrying…';
    }
  }

  async function refreshCurrentYear() {
    if (selectedYear !== CURRENT_YEAR) return;
    try {
      const data = await fetchData(CURRENT_YEAR);
      if (data && data.length > 0) {
        players = data;
        document.getElementById('last-updated').textContent = formatTime(new Date());
        renderList(sortPlayers(players, sortMode), true);
      }
    } catch (e) {}
  }

  const MIN_OPS = 0.200;
  const MAX_OPS = 1.1;
  const OPS_RANGE = MAX_OPS - MIN_OPS; // 0.9
  const OPS_SEGMENTS = [
    { from: 0.200, to: 0.650, color: '#d51920' },
    { from: 0.650, to: 0.750, color: '#fcb035' },
    { from: 0.750, to: 0.900, color: '#e8e613' },
    { from: 0.900, to: 1.000, color: '#78c043' },
    { from: 1.000, to: MAX_OPS, color: '#4b8d24' },
  ];
  const OPS_THRESHOLDS_VALS = [0.650, 0.750, 0.900, 1.000];

  function opsToPercent(val) {
    return Math.max(0, Math.min(1, (val - MIN_OPS) / OPS_RANGE));
  }

  function buildOPSScale() {
    const bar = document.getElementById('ops-bar');
    const labels = document.getElementById('ops-labels');
    bar.innerHTML = '';
    labels.innerHTML = '';

    OPS_SEGMENTS.forEach(s => {
      const seg = document.createElement('div');
      seg.className = 'ops-segment';
      const pct = ((s.to - s.from) / OPS_RANGE) * 100;
      seg.style.width = `calc(${pct}% - 4px)`;
      seg.style.background = s.color;
      seg.style.flexShrink = '0';
      bar.appendChild(seg);
    });

    // Labels left-aligned to start of each segment
    const labelData = [
      { val: '.200',  pos: opsToPercent(0.200) },
      { val: '.650',  pos: opsToPercent(0.650) },
      { val: '.750',  pos: opsToPercent(0.750) },
      { val: '.900',  pos: opsToPercent(0.900) },
      { val: '1.000', pos: opsToPercent(1.000) },
    ];
    labelData.forEach(l => {
      const lbl = document.createElement('div');
      lbl.className = 'ops-label';
      lbl.textContent = l.val;
      lbl.style.left = `${l.pos * 100}%`;
      labels.appendChild(lbl);
    });
  }

  async function fetchOPS(year) {
    const url = `https://statsapi.mlb.com/api/v1/teams/${TEAM_ID}/roster?rosterType=40Man&season=${year}&hydrate=person(stats(type=season,season=${year},group=hitting))`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    return (data.roster || [])
      .map(p => {
        const stat = p.person?.stats?.[0]?.splits?.[0]?.stat;
        const obp = parseFloat(stat?.obp) || 0;
        const slg = parseFloat(stat?.slg) || 0;
        const opsVal = parseFloat(stat?.ops) || (obp + slg);
        const ops = Math.round(opsVal * 1000) / 1000;
        return {
          name: p.person?.fullName || 'Unknown',
          ops,
          pos: p.position?.abbreviation || '',
          ab: parseInt(stat?.atBats) || 0,
          pa: parseInt(stat?.plateAppearances) || 0,
        };
      })
      .filter(p => {
        if (p.name === 'Shohei Ohtani') return true;
        if (p.pos === 'P') return false;
        return p.pa >= 1;
      })
      .sort((a, b) => b.ops - a.ops);
  }

  function alignOPSDividers() {
    const bar = document.getElementById('ops-bar');
    if (!bar) return;
    const segments = bar.querySelectorAll('.ops-segment');
    if (!segments.length) return;
    const barRect = bar.getBoundingClientRect();
    const barWidth = barRect.width;

    // Get right edge of each segment for divider positions
    const boundaries = [];
    segments.forEach((seg, i) => {
      if (i < segments.length - 1) {
        const r = seg.getBoundingClientRect();
        boundaries.push(r.right - barRect.left + 2.5); // center of 5px gap
      }
    });

    // Build a mapping: OPS value → pixel position within bar
    // Each segment spans from its 'from' to 'to' OPS value
    // Pixel position within bar = segment start px + (fraction within segment) * segment px width
    const segRects = Array.from(segments).map(s => s.getBoundingClientRect());

    function opsToPx(ops) {
      const clampedOps = Math.max(MIN_OPS, Math.min(MAX_OPS, ops));
      for (let i = 0; i < OPS_SEGMENTS.length; i++) {
        const seg = OPS_SEGMENTS[i];
        if (clampedOps <= seg.to || i === OPS_SEGMENTS.length - 1) {
          const segFrom = seg.from;
          const segTo = seg.to;
          const fraction = (clampedOps - segFrom) / (segTo - segFrom);
          const segLeft = segRects[i].left - barRect.left;
          const segWidth = segRects[i].width;
          return segLeft + fraction * segWidth + 3;
        }
      }
      return 0;
    }

    document.querySelectorAll('.ops-track').forEach(track => {
      const trackRect = track.getBoundingClientRect();
      const offset = barRect.left - trackRect.left;

      // Position dividers
      track.querySelectorAll('.ops-divider').forEach((div, i) => {
        if (boundaries[i] !== undefined) {
          div.style.left = (offset + boundaries[i]) + 'px';
        }
      });

      // Position dots using actual bar segment pixel positions
      track.querySelectorAll('.ops-dot').forEach(dot => {
        const ops = parseFloat(dot.dataset.ops);
        if (!isNaN(ops)) {
          const px = opsToPx(ops);
          dot.style.left = (offset + px) + 'px';
          dot.style.transform = 'translate(-50%, -50%)';
        }
      });
    });
  }

  let vinAudioCtx = null;

  function initAudioCtx() {
    if (!vinAudioCtx) {
      vinAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (vinAudioCtx.state === 'suspended') {
      vinAudioCtx.resume();
    }
  }

  // Prime AudioContext on first touch — play a silent buffer to fully unlock iOS audio
  document.addEventListener('touchstart', function primeAudio() {
    try {
      initAudioCtx();
      const ctx = vinAudioCtx;
      ctx.resume().then(() => {
        // Play a silent buffer to fully unlock the audio system
        const buf = ctx.createBuffer(1, 1, ctx.sampleRate);
        const src = ctx.createBufferSource();
        src.buffer = buf;
        src.connect(ctx.destination);
        src.start(0);
      });
    } catch(e) {}
    document.removeEventListener('touchstart', primeAudio);
  }, { once: true, passive: true });

  function playAnalogClick() {
    try {
      initAudioCtx();
      const ctx = vinAudioCtx;
      if (ctx.state === 'suspended') return; // not ready yet, skip gracefully
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.04, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 8);
      }
      const src = ctx.createBufferSource();
      src.buffer = buf;
      const gain = ctx.createGain();
      gain.gain.value = 0.6;
      src.connect(gain);
      gain.connect(ctx.destination);
      src.start();
    } catch(e) {}
  }

  function playVin(idx, cell) {
    const filename = VIN_CLIPS[idx];
    // In landscape the speaker is a .vin-speaker group; in portrait it's the svg itself
    const speakerEl = cell.querySelector('.vin-speaker') || cell.querySelector('svg');

    if (vinAudio) {
      vinAudio.pause();
      vinAudio.currentTime = 0;
      if (vinPlayingCell) {
        const prevSpeaker = vinPlayingCell.querySelector('.vin-speaker') || vinPlayingCell.querySelector('svg');
        if (prevSpeaker) prevSpeaker.style.opacity = '1';
      }
      if (vinPlayingCell === cell) {
        vinAudio = null;
        vinPlayingCell = null;
        return;
      }
    }

    vinAudio = new Audio(filename);
    vinPlayingCell = cell;
    if (speakerEl) speakerEl.style.opacity = '0.4';

    vinAudio.play().catch(e => console.log('Audio play failed:', e));
    vinAudio.addEventListener('ended', () => {
      if (speakerEl) speakerEl.style.opacity = '1';
      vinAudio = null;
      vinPlayingCell = null;
    });
  }

  // ── Postseason ──
  const PS_ROUNDS = [
    { key: 'WC', land: 'WILD CARD',       port: 'WC'  },
    { key: 'DS', land: 'DIVISION SERIES', port: 'DS'  },
    { key: 'CS', land: 'PENNANT',         port: 'PEN' },
    { key: 'WS', land: 'WORLD SERIES',    port: 'WS'  },
  ];
  const PS_YEARS = [];
  for (let y = 1969; y <= CURRENT_YEAR; y++) PS_YEARS.push(y);
  let psCache = {};
  let psLoaded = false;

  function makePSIcon(win) {
    const div = document.createElement('div');
    div.className = 'ps-icon ' + (win ? 'win' : 'loss');
    const ns = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('viewBox', '0 0 14 14');
    const p = document.createElementNS(ns, 'path');
    p.setAttribute('fill', 'none');
    p.setAttribute('stroke', '#fff');
    p.setAttribute('stroke-width', '2');
    p.setAttribute('stroke-linecap', 'round');
    p.setAttribute('stroke-linejoin', 'round');
    if (win) p.setAttribute('d', 'M2 7 L5.5 10.5 L12 3.5');
    else p.setAttribute('d', 'M3 3 L11 11 M11 3 L3 11');
    svg.appendChild(p);
    div.appendChild(svg);
    return div;
  }

  async function fetchPSYear(year) {
    try {
      const [recRes, psRes] = await Promise.all([
        fetch(`https://statsapi.mlb.com/api/v1/standings?leagueId=103,104&season=${year}&standingsTypes=regularSeason&hydrate=team`),
        fetch(`https://statsapi.mlb.com/api/v1/schedule?sportId=1&season=${year}&gameType=F,D,L,W&hydrate=team,seriesSummary,linescore`)
      ]);
      const recData = await recRes.json();
      const psSched = await psRes.json();

      let wl = '';
      for (const rec of recData.records || []) {
        for (const tr of rec.teamRecords || []) {
          if (tr.team?.id === TEAM_ID) { wl = `${tr.wins}-${tr.losses}`; break; }
        }
        if (wl) break;
      }

      const seriesMap = {};
      for (const date of psSched.dates || []) {
        for (const game of date.games || []) {
          const home = game.teams?.home?.team?.id;
          const away = game.teams?.away?.team?.id;
          if (home !== TEAM_ID && away !== TEAM_ID) continue;
          const gt = game.gameType;
          const rk = gt==='F'?'WC':gt==='D'?'DS':gt==='L'?'CS':gt==='W'?'WS':null;
          if (!rk) continue;
          if (!seriesMap[rk]) {
            const opp = home===TEAM_ID ? game.teams.away?.team?.name : game.teams.home?.team?.name;
            seriesMap[rk] = { opp: opp||'?', wins: 0, losses: 0 };
          }
          const s = seriesMap[rk];
          const ds = home===TEAM_ID ? game.teams.home?.score : game.teams.away?.score;
          const os = home===TEAM_ID ? game.teams.away?.score : game.teams.home?.score;
          if (game.status?.statusCode==='F' && ds!=null && os!=null) {
            if (ds > os) s.wins++; else if (os > ds) s.losses++;
          }
        }
      }
      const rounds = {};
      for (const [rk, s] of Object.entries(seriesMap)) {
        rounds[rk] = { win: s.wins>s.losses, opp: s.opp, series: `${s.wins}-${s.losses}` };
      }
      return { wl, rounds };
    } catch(e) { return { wl:'', rounds:{} }; }
  }

  function renderPSList() {
    const list = document.getElementById('ps-list');
    list.innerHTML = '';
    const isLand = window.innerWidth > window.innerHeight;

    const hdr = document.createElement('div');
    hdr.className = 'ps-header-row';
    const mkHdr = (text, cls) => { const d=document.createElement('div'); d.className='ps-header-cell '+cls; d.textContent=text; hdr.appendChild(d); };
    mkHdr('', 'ps-year-cell');
    mkHdr('W/L', 'ps-wl-cell');
    PS_ROUNDS.forEach(r => mkHdr(isLand ? r.land : r.port, 'ps-round-cell'));
    // Header rendered absolutely over ps-screen, not inside ps-list
    const psScreen = document.getElementById('ps-screen');
    psScreen.querySelectorAll('.ps-header-row').forEach(h => h.remove());
    psScreen.insertBefore(hdr, list);

    PS_YEARS.forEach(year => {
      const d = psCache[year] || { wl:'', rounds:{} };
      const row = document.createElement('div');
      row.className = 'ps-row';
      const mkCell = (text, cls) => { const c=document.createElement('div'); c.className=cls; c.textContent=text; row.appendChild(c); };
      mkCell(year, 'ps-year-cell');
      mkCell(d.wl||'—', 'ps-wl-cell');
      PS_ROUNDS.forEach(r => {
        const cell = document.createElement('div');
        cell.className = 'ps-round-cell';
        const rd = d.rounds[r.key];
        if (rd) {
          cell.appendChild(makePSIcon(rd.win));
          if (isLand) {
            const txt = document.createElement('div');
            txt.className = 'ps-result-text';
            const opp = document.createElement('div');
            opp.className = 'ps-opponent';
            const shortNames = {
              'Diamondbacks': "D'Backs",
            };
            const lastName = rd.opp.split(' ').pop();
            opp.textContent = (shortNames[lastName] || lastName).toUpperCase();
            const ser = document.createElement('div');
            ser.className = 'ps-series';
            ser.textContent = rd.series;
            txt.appendChild(opp);
            txt.appendChild(ser);
            cell.appendChild(txt);
          }
        }
        row.appendChild(cell);
      });
      list.appendChild(row);
    });

    // After render, measure column positions and add dividers to every row
    requestAnimationFrame(() => {
      const psScreen = document.getElementById('ps-screen');
      psScreen.querySelectorAll('.ps-svg-lines').forEach(s => s.remove());

      const firstRow = list.querySelector('.ps-row');
      if (!firstRow) return;

      // Measure divider positions from first row cells
      const rowRect = firstRow.getBoundingClientRect();
      const dividerXs = [];
      firstRow.querySelectorAll('div').forEach(cell => {
        const r = cell.getBoundingClientRect();
        const xLeft = r.left - rowRect.left;
        if (cell.classList.contains('ps-wl-cell') && isLand) {
          dividerXs.push(xLeft);
          dividerXs.push(r.right - rowRect.left);
        }
        if (cell.classList.contains('ps-round-cell')) {
          dividerXs.push(xLeft);
        }
      });

      // Add dividers to every row
      list.querySelectorAll('.ps-row').forEach(row => {
        dividerXs.forEach(x => {
          const div = document.createElement('div');
          div.className = 'ps-divider';
          div.style.left = x + 'px';
          row.appendChild(div);
        });
      });
    });
  }

  async function loadPS() {
    if (!psLoaded) {
      document.getElementById('ps-list').innerHTML = '<div style="color:#797878;font-family:Bricolage Grotesque,sans-serif;font-size:15px;padding:24px 0;">Loading…</div>';
      await Promise.all(PS_YEARS.map(y => fetchPSYear(y).then(d => { psCache[y]=d; })));
      psLoaded = true;
    }
    renderPSList();
  }

  // Inject PS CSS via JS to bypass any stylesheet caching
  (function() {
    const s = document.createElement('style');
    s.textContent = `
      .ps-header-row { position:absolute; top:0; left:0; right:0; display:flex; align-items:flex-end; height:40px; padding-bottom:5px; border:none; }
      .ps-header-cell { font-size:13px; font-weight:700; color:#797878; font-family:'Bricolage Grotesque',sans-serif; letter-spacing:0.05em; text-transform:uppercase; white-space:nowrap; flex-shrink:0; }
      .ps-row { display:flex; align-items:center; height:40px; border-bottom:0.5px solid #6e6e6e; border-top:none; position:relative; }
      .ps-divider { position:absolute; top:3px; bottom:3px; width:0.5px; background:#6e6e6e; pointer-events:none; }
      .ps-year-cell { font-size:18px; font-weight:400; color:#fff; font-family:'Bricolage Grotesque',sans-serif; width:70px; min-width:70px; flex-shrink:0; }
      .ps-wl-cell { font-family:'Bricolage Grotesque',sans-serif; width:80px; min-width:80px; flex-shrink:0; padding-left:15px; }
      .ps-header-cell.ps-wl-cell { font-size:13px; font-weight:700; color:#797878; letter-spacing:0.05em; text-transform:uppercase; }
      .ps-row .ps-wl-cell { font-size:13px; font-weight:400; color:#797878; }
      .ps-round-cell { display:flex; align-items:center; justify-content:flex-start; gap:8px; width:150px; min-width:150px; flex-shrink:0; padding-left:12px; }
      .ps-header-cell.ps-round-cell { justify-content:flex-start; padding-left:12px; }
      .ps-icon { width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
      .ps-icon.win { background:#2d7a2d; }
      .ps-icon.loss { background:#cc2509; }
      .ps-icon svg { width:14px; height:14px; }
      .ps-result-text { display:flex; flex-direction:column; line-height:1.2; }
      .ps-opponent { font-size:13px; font-weight:700; color:#797878; font-family:'Bricolage Grotesque',sans-serif; letter-spacing:0.05em; text-transform:uppercase; white-space:nowrap; }
      .ps-series { font-size:11px; color:#707070; font-family:'Bricolage Grotesque',sans-serif; white-space:nowrap; }
      @media (orientation:landscape) { .ps-wl-cell { padding-right:8px; } }
      @media (orientation:portrait) {
        .ps-result-text { display:none; }
        .ps-round-cell { width:60px; min-width:60px; padding-left:0; justify-content:center; }
        .ps-header-cell.ps-round-cell { justify-content:flex-start; padding-left:4px; }
        .ps-year-cell { width:50px; min-width:50px; font-size:15px; }
        .ps-wl-cell { width:60px; min-width:60px; font-size:13px; padding-left:0; }
      }
    `;
    document.head.appendChild(s);
  })();

  // ── Averages screen ──
  const AVG_COLS = [
    { key: 'avg',      labelLand: 'AVERAGE',      labelPort: 'AVG',       wide: false },
    { key: 'risp',     labelLand: 'W/ RISP',         labelPort: 'RISP',      wide: false },
    { key: 'lc',       labelLand: 'LATE + CLOSE',    labelPort: 'LT+CL',     wide: false },
    { key: 'career',   labelLand: 'LIFETIME',         labelPort: 'LIFE',      wide: false },
  ];
  let avgData = null;
  let loadedAvgYear = null;

  function fmtAvg(val) {
    if (val === null || val === undefined || isNaN(val)) return '—';
    return val.toFixed(3).replace(/^0/, '');
  }

  async function loadAvg(year) {
    document.getElementById('avg-list').innerHTML = '<div style="color:#797878;font-family:\'Bricolage Grotesque\',sans-serif;font-size:15px;padding:24px 0;">Loading…</div>';
    try {
      // Roster with season stats
      const rosterRes = await fetch(`https://statsapi.mlb.com/api/v1/teams/${TEAM_ID}/roster?rosterType=40Man&season=${year}&hydrate=person(stats(type=season,season=${year},group=hitting))`);
      const rosterData = await rosterRes.json();

      // Build valid player set (position players + Ohtani, 10+ AB)
      const validIds = new Set();
      for (const p of rosterData.roster || []) {
        const name = p.person?.fullName;
        const pos = p.position?.abbreviation;
        const stat = p.person?.stats?.[0]?.splits?.[0]?.stat;
        const pa = parseInt(stat?.plateAppearances) || 0;
        if (name === 'Shohei Ohtani') { validIds.add(p.person.id); continue; }
        if (pos === 'P') continue;
        if (pa >= 1) validIds.add(p.person.id);
      }

      // Build base map from season stats
      const map = {};
      for (const p of rosterData.roster || []) {
        const id = p.person?.id;
        if (!validIds.has(id)) continue;
        const stat = p.person?.stats?.[0]?.splits?.[0]?.stat;
        const avg = parseFloat(stat?.avg);
        map[id] = { name: p.person?.fullName, avg: isNaN(avg) ? null : avg, risp: null, lc: null, career: null };
      }

      // RISP + Late & Close splits — non-fatal
      try {
        const splitRes = await fetch(`https://statsapi.mlb.com/api/v1/stats?stats=statSplits&sitCodes=risp,lc&group=hitting&season=${year}&playerPool=All&teamId=${TEAM_ID}`);
        const splitData = await splitRes.json();
        for (const group of splitData.stats || []) {
          for (const sp of group.splits || []) {
            const id = sp.player?.id;
            if (!map[id]) continue;
            const code = sp.split?.code;
            const avg = parseFloat(sp.stat?.avg);
            if (isNaN(avg)) continue;
            if (code === 'risp') map[id].risp = avg;
            if (code === 'lc') map[id].lc = avg;
          }
        }
      } catch(e) {}

      // Career — fetch per-player
      const ids = Object.keys(map);
      await Promise.all(ids.map(async id => {
        try {
          const res = await fetch(`https://statsapi.mlb.com/api/v1/people/${id}/stats?stats=career&group=hitting`);
          const data = await res.json();
          const avg = parseFloat(data.stats?.[0]?.splits?.[0]?.stat?.avg);
          if (!isNaN(avg)) map[id].career = avg;
        } catch(e) {}
      }));

      avgData = Object.values(map).filter(p => p.avg !== null).sort((a,b) => (b.avg||0)-(a.avg||0));
      loadedAvgYear = year;
      renderAvgList();
    } catch(e) {
      document.getElementById('avg-list').innerHTML = '<div style="color:#797878;font-family:\'Bricolage Grotesque\',sans-serif;font-size:15px;padding:24px 0;">Error: ' + e.message + '</div>';
    }
  }

  function renderAvgList() {
    const list = document.getElementById('avg-list');
    list.innerHTML = '';
    if (!avgData) return;
    const isLand = window.innerWidth > window.innerHeight;
    const avgScreen = document.getElementById('avg-screen');

    // Header — absolutely positioned
    avgScreen.querySelectorAll('.avg-header-row').forEach(h => h.remove());
    const hdr = document.createElement('div');
    hdr.className = 'avg-header-row';
    const nameHdr = document.createElement('div');
    nameHdr.style.cssText = 'width:' + (isLand ? '206' : '142') + 'px;min-width:' + (isLand ? '206' : '142') + 'px;flex-shrink:0;';
    hdr.appendChild(nameHdr);
    AVG_COLS.forEach(col => {
      const cell = document.createElement('div');
      cell.className = 'avg-header-cell';
      cell.style.cssText = 'flex:1; padding-left:' + (isLand ? '10' : '4') + 'px;';
      cell.textContent = isLand ? col.labelLand : col.labelPort;
      hdr.appendChild(cell);
    });
    avgScreen.insertBefore(hdr, list);

    // Rows
    avgData.forEach((p, idx) => {
      const row = document.createElement('div');
      row.className = 'avg-row';

      const nameEl = document.createElement('div');
      nameEl.className = 'avg-name-cell';
      nameEl.textContent = p.name;
      row.appendChild(nameEl);

      AVG_COLS.forEach(col => {
        const cell = document.createElement('div');
        cell.className = 'avg-stat-cell';
        const val = col.key === 'career' ? p.career : col.key === 'lc' ? p.lc : p[col.key];
        const showArrow = col.key !== 'avg' && isLand && val !== null && p.avg !== null;

        if (showArrow) {
          const arrow = document.createElement('span');
          arrow.className = 'avg-arrow ' + (val >= p.avg ? 'up' : 'down');
          arrow.textContent = val >= p.avg ? '↑' : '↓';
          cell.appendChild(arrow);
        }
        const valEl = document.createElement('span');
        valEl.className = 'avg-value';
        valEl.textContent = fmtAvg(val);
        cell.appendChild(valEl);
        row.appendChild(cell);
      });
      list.appendChild(row);
    });

    // Dividers
    requestAnimationFrame(() => {
      const firstRow = list.querySelector('.avg-row');
      if (!firstRow) return;
      const rowRect = firstRow.getBoundingClientRect();
      const xs = [];
      firstRow.querySelectorAll('.avg-stat-cell').forEach(cell => {
        xs.push(cell.getBoundingClientRect().left - rowRect.left);
      });
      list.querySelectorAll('.avg-row').forEach(row => {
        row.querySelectorAll('.avg-divider').forEach(d => d.remove());
        xs.forEach(x => {
          const div = document.createElement('div');
          div.className = 'avg-divider';
          div.style.left = x + 'px';
          row.appendChild(div);
        });
      });
    });
  }

  document.getElementById('year-btn').textContent = CURRENT_YEAR;
  const container = document.getElementById('player-list');
  container.style.opacity = '0';
  navigateTo('ops');
</script>
</body>
