<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Dodger HRs">
  <meta name="theme-color" content="#000000">
  <title>Dodger Home Runs</title>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      background: #000;
      color: #fff;
      font-family: 'Bricolage Grotesque', -apple-system, 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; -ms-overflow-style: none; }

    #app {
      min-height: 100vh;
      min-height: -webkit-fill-available;
      padding-top: max(env(safe-area-inset-top), 20px);
      padding-bottom: max(env(safe-area-inset-bottom), 40px);
    }

    #inner {
      padding-left: max(env(safe-area-inset-left), 24px);
      padding-right: max(env(safe-area-inset-right), 24px);
    }

    /* ── Header ── */
    #header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2em;
    }

    #header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.1px;
      color: #fff;
      font-family: 'Bricolage Grotesque', sans-serif;
      white-space: nowrap;
    }

    #year-btn {
      font-size: 18px;
      font-weight: 700;
      font-family: 'Bricolage Grotesque', sans-serif;
      color: #fff;
      background: none;
      border: 0.5px solid #6e6e6e;
      border-radius: 4px;
      padding: 2px 8px;
      cursor: pointer;
      transition: border-color 0.15s;
      line-height: 1.4;
    }
    #year-btn:active { border-color: #888; }

    #header-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    #last-updated {
      font-size: 11px;
      color: #666;
      font-family: 'Bricolage Grotesque', sans-serif;
      white-space: nowrap;
    }

    #sort-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s;
    }
    #sort-btn:active { opacity: 0.5; }

    /* ── Year dropdown overlay ── */
    #year-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 100;
      background: rgba(0,0,0,0.7);
    }
    #year-overlay.open { display: block; }

    #year-dropdown {
      position: absolute;
      background: #0a0a0a;
      border: 0.5px solid #6e6e6e;
      border-radius: 6px;
      overflow-y: scroll;
      -webkit-overflow-scrolling: touch;
      max-height: 70vh;
      width: 80px;
    }

    .year-option {
      display: block;
      width: 100%;
      padding: 10px 8px;
      font-size: 18px;
      font-weight: 700;
      font-family: 'Bricolage Grotesque', sans-serif;
      color: #fff;
      background: none;
      border: none;
      border-bottom: 0.5px solid #222;
      text-align: left;
      cursor: pointer;
      transition: background 0.1s;
    }
    .year-option:last-child { border-bottom: none; }
    .year-option:active { background: #1a1a1a; }
    .year-option.active { color: #0977cc; }

    /* ── Player list ── */
    #player-list {
      width: 100%;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    #player-list.fade-out {
      opacity: 0;
      transform: translateY(-8px);
    }
    #player-list.fade-in {
      opacity: 1;
      transform: translateY(0);
    }

    .player-row {
      display: flex;
      align-items: center;
      border-bottom: 0.5px solid #6e6e6e;
      gap: 14px;
      will-change: transform;
      height: 40px;
    }

    .player-name {
      font-size: 18px;
      font-weight: 400;
      color: #fff;
      width: 190px;
      min-width: 190px;
      white-space: nowrap;
      font-family: 'Bricolage Grotesque', sans-serif;
      letter-spacing: -0.1px;
      flex-shrink: 0;
    }

    .tick-area {
      flex: 1;
      height: 100%;
      min-width: 0;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
    }

    .tick-area svg {
      display: block;
      height: 100%;
    }

    .hr-count {
      font-size: 18px;
      font-weight: 400;
      color: #fff;
      min-width: 32px;
      text-align: right;
      font-family: 'Bricolage Grotesque', sans-serif;
      flex-shrink: 0;
    }

    #status-msg {
      font-family: 'Bricolage Grotesque', sans-serif;
      color: #444;
      font-size: 13px;
      text-align: center;
      margin-top: 48px;
    }

    #portrait-note {
      display: none;
      font-family: 'Bricolage Grotesque', sans-serif;
      color: #6e6e6e;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-align: center;
      margin-top: 32px;
      text-transform: uppercase;
    }

    #version {
      display: block;
      font-family: 'Bricolage Grotesque', sans-serif;
      color: #6e6e6e;
      font-size: 11px;
      text-align: center;
      margin-top: 8px;
    }

    @media (orientation: portrait) {
      #title { font-size: 15px; }
      #year-btn { font-size: 15px; padding: 4px 8px; }
      .player-name { font-size: 15px; width: 130px; min-width: 130px; }
      .hr-count { font-size: 15px; min-width: 24px; }
      #portrait-note { display: block; font-size: 13px; }
      .year-option { font-size: 15px; }
      #header { padding-bottom: 2px; }
    }
  </style>
  <style id="batter-styles">
    #batter-stage {
      position: absolute;
      pointer-events: none;
      overflow: visible;
      z-index: 10;
    }
    /* Ball */
    #batter-ball {
      position: absolute;
      width: 7px;
      height: 7px;
      background: #fff;
      border-radius: 50%;
      opacity: 0;
    }
  </style>
</head>
<body>
<div id="app">
  <div id="inner">
    <div id="header">
      <div id="header-left">
        <div id="title">Dodger Home Runs</div>
        <button id="year-btn">2026</button>
      </div>
      <div id="header-right">
        <span id="last-updated"></span>
        <button id="sort-btn" title="Toggle sort" aria-label="Toggle sort order">
          <svg width="28" height="22" viewBox="0 0 28 22" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="8.5" cy="5.5" r="2.5" stroke="#ffffff" stroke-width="1.6"/>
            <line x1="2" y1="5.5" x2="6" y2="5.5" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
            <line x1="11" y1="5.5" x2="26" y2="5.5" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
            <circle cx="19.5" cy="16.5" r="2.5" stroke="#ffffff" stroke-width="1.6"/>
            <line x1="2" y1="16.5" x2="17" y2="16.5" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
            <line x1="22" y1="16.5" x2="26" y2="16.5" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>

    <div id="player-list"></div>
    <div id="status-msg"></div>
    <div id="portrait-note">Best in landscape view</div>
    <div id="version">V13</div>
  </div>
</div>

<!-- Year picker overlay -->
<div id="year-overlay">
  <div id="year-dropdown"></div>
</div>

<script>
  const TEAM_ID = 119;
  const CURRENT_YEAR = 2026;
  const YEARS = [];
  for (let y = CURRENT_YEAR; y >= 2013; y--) YEARS.push(y);

  const POLL_MS = 60000;
  const MAX_TICKS = 62;
  const BAR_COLOR = '#0977cc';
  const ROW_H = 40;
  const BAR_PADDING = 3;

  const PLACEHOLDER = [
    { name: 'Shohei Ohtani',       hr: 8 },
    { name: 'Freddie Freeman',     hr: 5 },
    { name: 'Teoscar Hernández',   hr: 4 },
    { name: 'Will Smith',          hr: 3 },
    { name: 'Max Muncy',           hr: 3 },
    { name: 'Dalton Rushing',      hr: 2 },
    { name: 'Andy Pages',          hr: 2 },
    { name: 'Hyeseong Kim',        hr: 1 },
    { name: 'Miguel Rojas',        hr: 1 },
    { name: 'Alex Call',           hr: 0 },
    { name: 'Santiago Espinal',    hr: 0 },
    { name: 'Kyle Tucker',         hr: 0 },
    { name: 'Michael Conforto',    hr: 0 },
    { name: 'Tommy Edman',         hr: 0 },
  ];

  let sortMode = 'most';
  let players = [];
  let animating = false;
  let dataLoaded = false;
  let selectedYear = CURRENT_YEAR;
  let pollTimer = null;

  // ── Build year dropdown ──
  const dropdown = document.getElementById('year-dropdown');
  YEARS.forEach(y => {
    const btn = document.createElement('button');
    btn.className = 'year-option' + (y === CURRENT_YEAR ? ' active' : '');
    btn.textContent = y;
    btn.dataset.year = y;
    btn.addEventListener('click', () => selectYear(y));
    dropdown.appendChild(btn);
  });

  document.getElementById('year-btn').addEventListener('click', () => {
    const btn = document.getElementById('year-btn');
    const rect = btn.getBoundingClientRect();
    const dropdown = document.getElementById('year-dropdown');
    dropdown.style.left = rect.left + 'px';
    dropdown.style.top = (rect.bottom + 4) + 'px';
    document.getElementById('year-overlay').classList.add('open');
  });

  document.getElementById('year-overlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('year-overlay')) {
      document.getElementById('year-overlay').classList.remove('open');
    }
  });

  function selectYear(y) {
    document.getElementById('year-overlay').classList.remove('open');
    if (y === selectedYear) return;
    selectedYear = y;
    document.getElementById('year-btn').textContent = y;
    document.querySelectorAll('.year-option').forEach(b => {
      b.classList.toggle('active', parseInt(b.dataset.year) === y);
    });
    // Stop live polling if not current year
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    document.getElementById('last-updated').textContent = '';
    document.getElementById('last-updated').style.display = 'none';
    loadYear(y);
  }

  // ── Utilities ──
  function formatTime(d) {
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function sortPlayers(list, mode) {
    const copy = [...list];
    if (mode === 'most') {
      copy.sort((a, b) => b.hr - a.hr || a.name.localeCompare(b.name));
    } else {
      copy.sort((a, b) => a.name.localeCompare(b.name));
    }
    return copy;
  }

  // ── SVG tick builder (draws N filled ticks out of MAX_TICKS slots) ──
  function buildTickSVG(hr, displayHr) {
    // hr = actual count, displayHr = how many to visually show (for animation)
    const d = displayHr !== undefined ? displayHr : hr;
    const slots = Math.max(MAX_TICKS, hr);
    const barH = ROW_H - BAR_PADDING * 2;
    const barY = BAR_PADDING;
    const slotW = 100 / MAX_TICKS;
    const viewW = slots * slotW;
    const gapFrac = 0.18;
    const barW = slotW * (1 - gapFrac);

    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('viewBox', `0 0 ${viewW} ${ROW_H}`);
    svg.setAttribute('preserveAspectRatio', 'none');
    svg.style.width = hr > MAX_TICKS ? `${(hr / MAX_TICKS) * 100}%` : '100%';

    for (let i = 0; i < d; i++) {
      const rect = document.createElementNS(svgNS, 'rect');
      rect.setAttribute('x', i * slotW + slotW * (gapFrac / 2));
      rect.setAttribute('y', barY);
      rect.setAttribute('width', barW);
      rect.setAttribute('height', barH);
      rect.setAttribute('fill', BAR_COLOR);
      svg.appendChild(rect);
    }
    return svg;
  }

  // ── Render list (names + 0 ticks initially for grow-in, or full for instant) ──
  function renderList(sorted, instant) {
    const container = document.getElementById('player-list');
    container.innerHTML = '';
    sorted.forEach(p => {
      const row = document.createElement('div');
      row.className = 'player-row';
      row.dataset.name = p.name;
      row.dataset.hr = p.hr;

      const nameEl = document.createElement('div');
      nameEl.className = 'player-name';
      nameEl.textContent = p.name;

      const tickArea = document.createElement('div');
      tickArea.className = 'tick-area';
      tickArea.appendChild(buildTickSVG(p.hr, instant ? p.hr : 0));

      const countEl = document.createElement('div');
      countEl.className = 'hr-count';
      countEl.textContent = instant ? p.hr : 0;

      row.appendChild(nameEl);
      row.appendChild(tickArea);
      row.appendChild(countEl);
      container.appendChild(row);
    });
  }

  // ── HR grow-in animation ──
  // Increments displayed HR count one tick at a time across all rows simultaneously
  function animateHRGrowIn(sorted) {
    const maxHR = Math.max(...sorted.map(p => p.hr), 0);
    if (maxHR === 0) return;

    const rows = document.querySelectorAll('.player-row');
    const rowMap = {};
    rows.forEach(r => { rowMap[r.dataset.name] = r; });

    let tick = 0;
    const TICK_SPEED = 40; // ms per tick — fast progress bar feel

    const timer = setInterval(() => {
      tick++;
      sorted.forEach(p => {
        const row = rowMap[p.name];
        if (!row) return;
        const show = Math.min(tick, p.hr);
        const tickArea = row.querySelector('.tick-area');
        const countEl = row.querySelector('.hr-count');
        tickArea.innerHTML = '';
        tickArea.appendChild(buildTickSVG(p.hr, show));
        countEl.textContent = show;
      });
      if (tick >= maxHR) clearInterval(timer);
    }, TICK_SPEED);
  }

  // ── Sort animation (FLIP) ──
  function animateSort(newSorted) {
    if (animating) return;
    animating = true;

    const container = document.getElementById('player-list');
    const oldPos = {};
    container.querySelectorAll('.player-row').forEach(r => {
      oldPos[r.dataset.name] = r.getBoundingClientRect().top;
    });

    renderList(newSorted, true); // instant, no grow-in on sort

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        container.querySelectorAll('.player-row').forEach(r => {
          const old = oldPos[r.dataset.name];
          if (old === undefined) return;
          const diff = old - r.getBoundingClientRect().top;
          if (diff !== 0) {
            r.style.transition = 'none';
            r.style.transform = `translateY(${diff}px)`;
            requestAnimationFrame(() => {
              r.style.transition = 'transform 0.45s cubic-bezier(0.4, 0, 0.2, 1)';
              r.style.transform = '';
            });
          }
        });
        setTimeout(() => { animating = false; }, 500);
      });
    });
  }

  // ── Batter animation ──
  function playBatterAnimation(onComplete) {
    // Find the top player row to anchor the batter
    const firstRow = document.querySelector('.player-row');
    if (!firstRow) { onComplete(); return; }

    const rowRect = firstRow.getBoundingClientRect();
    const innerRect = document.getElementById('inner').getBoundingClientRect();

    // Batter stands just after the name column, on the bottom rule of the first row
    const batterX = innerRect.left + 200; // just past name column
    const batterY = rowRect.bottom;       // feet on the rule line
    const batterH = 52;                   // batter height in px
    const BAT_COLOR = '#0977cc';
    const BALL_COLOR = '#ffffff';

    // ── Create stage container ──
    const stage = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    stage.setAttribute('id', 'batter-stage');
    stage.style.position = 'fixed';
    stage.style.left = '0';
    stage.style.top = '0';
    stage.style.width = '100vw';
    stage.style.height = '100vh';
    stage.style.pointerEvents = 'none';
    stage.style.overflow = 'visible';
    stage.style.zIndex = '50';
    document.body.appendChild(stage);

    // ── SVG path helpers ──
    const ns = 'http://www.w3.org/2000/svg';

    function mkPath(d, fill, extra) {
      const p = document.createElementNS(ns, 'path');
      p.setAttribute('d', d);
      p.setAttribute('fill', fill);
      if (extra) Object.entries(extra).forEach(([k,v]) => p.setAttribute(k, v));
      return p;
    }

    function mkCircle(cx, cy, r, fill) {
      const c = document.createElementNS(ns, 'circle');
      c.setAttribute('cx', cx); c.setAttribute('cy', cy);
      c.setAttribute('r', r); c.setAttribute('fill', fill);
      return c;
    }

    function mkRect(x, y, w, h, fill, rx) {
      const r = document.createElementNS(ns, 'rect');
      r.setAttribute('x', x); r.setAttribute('y', y);
      r.setAttribute('width', w); r.setAttribute('height', h);
      r.setAttribute('fill', fill);
      if (rx) r.setAttribute('rx', rx);
      return r;
    }

    // ── Batter group — drawn at origin, translated into position ──
    // Scale factor: design at 100px tall, scale to batterH
    const sc = batterH / 100;
    const bx = batterX;
    const by = batterY; // feet at rule line

    // Batter group
    const bGroup = document.createElementNS(ns, 'g');
    bGroup.setAttribute('transform', `translate(${bx}, ${by}) scale(${sc})`);
    bGroup.style.opacity = '1';

    // Right-handed batter silhouette — drawn feet at y=0, top at y=-100
    // Body parts (all in local coords, feet at 0)
    // Helmet/head
    bGroup.appendChild(mkCircle(2, -85, 10, BAT_COLOR));
    // Helmet brim
    bGroup.appendChild(mkRect(-8, -80, 14, 4, BAT_COLOR, 1));
    // Torso
    bGroup.appendChild(mkPath('M-8,-75 C-10,-55 -8,-45 -5,-35 L8,-35 C10,-45 10,-55 8,-75 Z', BAT_COLOR));
    // Front arm (extended, holding bat)
    bGroup.appendChild(mkPath('M5,-65 L22,-58 L20,-53 L3,-60 Z', BAT_COLOR));
    // Back arm (cocked)
    bGroup.appendChild(mkPath('M-5,-65 L-18,-55 L-16,-51 L-3,-61 Z', BAT_COLOR));
    // Front leg
    bGroup.appendChild(mkPath('M-3,-35 L-6,0 L0,0 L3,-35 Z', BAT_COLOR));
    // Back leg (bent, ready stance)
    bGroup.appendChild(mkPath('M5,-35 L14,-18 L10,0 L16,0 L20,-18 L12,-35 Z', BAT_COLOR));
    // Bat (held upright in ready position)
    const bat = document.createElementNS(ns, 'g');
    bat.setAttribute('id', 'bat-g');
    bat.appendChild(mkRect(19, -90, 4, 40, BAT_COLOR, 2));
    bGroup.appendChild(bat);

    stage.appendChild(bGroup);

    // ── Ball ──
    const ball = mkCircle(0, 0, 5, BALL_COLOR);
    ball.style.opacity = '0';
    stage.appendChild(ball);

    // ── Loose bat (for bat flip phase) ──
    const batFlip = document.createElementNS(ns, 'rect');
    batFlip.setAttribute('width', 4 * sc);
    batFlip.setAttribute('height', 40 * sc);
    batFlip.setAttribute('fill', BAT_COLOR);
    batFlip.setAttribute('rx', 2);
    batFlip.style.opacity = '0';
    batFlip.style.transformOrigin = `${2 * sc}px ${20 * sc}px`;
    stage.appendChild(batFlip);

    // ── Animation timeline ──
    // Phase 1: Ready pose — show for 400ms
    // Phase 2: Ball shoots from right to contact point (200ms)
    // Phase 3: Swing — uppercut rotation (250ms)
    // Phase 4: Ball flies off top (200ms), bat flip starts
    // Phase 5: Batter begins trot (walk right, 600ms)
    // Phase 6: Batter fades out (300ms)
    // Phase 7: onComplete → bar grow-in

    let startTime = null;
    const PHASES = {
      ready:      { start: 0,    end: 400 },
      ballIn:     { start: 400,  end: 650 },
      swing:      { start: 600,  end: 900 },
      ballOut:    { start: 650,  end: 900 },
      batFlip:    { start: 850,  end: 1400 },
      trot:       { start: 900,  end: 1500 },
      fade:       { start: 1400, end: 1700 },
      done:       { start: 1700 }
    };

    // Contact point in screen coords
    const contactX = bx + 25 * sc;
    const contactY = by - 58 * sc;

    // Ball start (far right of screen)
    const ballStartX = window.innerWidth + 10;
    const ballStartY = contactY + 5;

    // Ball end (off top of screen)
    const ballEndX = contactX - 30;
    const ballEndY = -30;

    // Bat flip positions
    const batFlipStartX = bx + 22 * sc;
    const batFlipStartY = by - 90 * sc;

    let completed = false;

    function ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
    function lerp(a, b, t) { return a + (b - a) * t; }
    function clamp01(t) { return Math.max(0, Math.min(1, t)); }

    function tick(ts) {
      if (!startTime) startTime = ts;
      const elapsed = ts - startTime;

      // ── Phase: Ball shoots in ──
      if (elapsed >= PHASES.ballIn.start && elapsed < PHASES.ballOut.start) {
        const t = clamp01((elapsed - PHASES.ballIn.start) / (PHASES.ballIn.end - PHASES.ballIn.start));
        const et = ease(t);
        ball.style.opacity = '1';
        ball.setAttribute('cx', lerp(ballStartX, contactX, et));
        ball.setAttribute('cy', lerp(ballStartY, contactY, et));
      }

      // ── Phase: Swing ──
      if (elapsed >= PHASES.swing.start && elapsed < PHASES.swing.end) {
        const t = clamp01((elapsed - PHASES.swing.start) / (PHASES.swing.end - PHASES.swing.start));
        const et = ease(t);
        // Rotate torso/arms: uppercut swing, rotate batter group slightly
        const swingAngle = lerp(0, -25, et); // slight upper-body lean back then through
        bGroup.setAttribute('transform',
          `translate(${bx}, ${by}) scale(${sc}) rotate(${swingAngle}, 0, -50)`);
        // Bat rotates from upright to horizontal (uppercut arc)
        const batAngle = lerp(0, -110, et);
        bat.setAttribute('transform', `rotate(${batAngle}, 21, -70)`);
        // Hide ball at contact
        if (t > 0.3) ball.style.opacity = '0';
      }

      // ── Phase: Ball flies off top ──
      if (elapsed >= PHASES.ballOut.start && elapsed < PHASES.ballOut.end) {
        const t = clamp01((elapsed - PHASES.ballOut.start) / (PHASES.ballOut.end - PHASES.ballOut.start));
        const et = ease(t);
        if (elapsed < PHASES.swing.start + 150) {
          ball.style.opacity = '1';
          ball.setAttribute('cx', lerp(contactX, ballEndX, et));
          ball.setAttribute('cy', lerp(contactY, ballEndY, et));
        }
      }

      // ── Phase: Bat flip ──
      if (elapsed >= PHASES.batFlip.start) {
        // Show loose bat, hide held bat
        bat.style.opacity = '0';
        batFlip.style.opacity = '1';
        const t = clamp01((elapsed - PHASES.batFlip.start) / (PHASES.batFlip.end - PHASES.batFlip.start));
        const et = ease(t);
        // Bat arcs up then comes back down
        const flipY = elapsed < (PHASES.batFlip.start + PHASES.batFlip.end) / 2
          ? lerp(batFlipStartY, batFlipStartY - 80, clamp01(t * 2))
          : lerp(batFlipStartY - 80, batFlipStartY + 60, clamp01((t - 0.5) * 2));
        const flipX = lerp(batFlipStartX, batFlipStartX + 20, et);
        const flipRot = lerp(0, 540, et);
        batFlip.setAttribute('x', flipX);
        batFlip.setAttribute('y', flipY);
        batFlip.style.transform = `rotate(${flipRot}deg)`;
        batFlip.style.transformOrigin = `${flipX + 2*sc}px ${flipY + 20*sc}px`;
        // Fade bat out at end
        if (t > 0.85) batFlip.style.opacity = String(1 - (t - 0.85) / 0.15);
      }

      // ── Phase: Trot ──
      if (elapsed >= PHASES.trot.start && elapsed < PHASES.fade.end) {
        const t = clamp01((elapsed - PHASES.trot.start) / (PHASES.trot.end - PHASES.trot.start));
        const trotX = lerp(0, 60, ease(t));
        // Restore upright pose
        bGroup.setAttribute('transform',
          `translate(${bx + trotX}, ${by}) scale(${sc})`);
        bat.style.opacity = '0';
      }

      // ── Phase: Fade out ──
      if (elapsed >= PHASES.fade.start) {
        const t = clamp01((elapsed - PHASES.fade.start) / (PHASES.fade.end - PHASES.fade.start));
        bGroup.style.opacity = String(1 - t);
      }

      // ── Done ──
      if (elapsed >= PHASES.done.start && !completed) {
        completed = true;
        stage.remove();
        onComplete();
        return;
      }

      requestAnimationFrame(tick);
    }

    requestAnimationFrame(tick);
  }

  // ── Year transition: fade out → render names → batter animation → grow in HRs ──
  function transitionToYear(sorted) {
    const container = document.getElementById('player-list');

    // 1. Fade out + slide up
    container.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
    container.style.opacity = '0';
    container.style.transform = 'translateY(-8px)';

    setTimeout(() => {
      // 2. Render names with 0 ticks
      renderList(sorted, false);

      // 3. Fade in
      container.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
      container.style.opacity = '1';
      container.style.transform = 'translateY(0)';

      // 4. After fade in, play batter animation, then grow in HRs
      setTimeout(() => {
        playBatterAnimation(() => {
          animateHRGrowIn(sorted);
        });
      }, 220);

    }, 220);
  }

  // ── Fetch data ──
  async function fetchData(year) {
    const url = `https://statsapi.mlb.com/api/v1/teams/${TEAM_ID}/roster?rosterType=active&season=${year}&hydrate=person(stats(type=season,season=${year},group=hitting))`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    return (data.roster || [])
      .filter(p => {
        const pos = p.position?.abbreviation || '';
        const name = p.person?.fullName || '';
        if (pos === 'P' && name !== 'Shohei Ohtani') return false;
        return true;
      })
      .map(p => {
        const stat = p.person?.stats?.[0]?.splits?.[0]?.stat;
        return { name: p.person?.fullName || 'Unknown', hr: stat?.homeRuns ?? 0 };
      });
  }

  // ── Load a year (with transition) ──
  async function loadYear(year, initial) {
    const statusEl = document.getElementById('status-msg');
    const updEl    = document.getElementById('last-updated');

    try {
      const data = await fetchData(year);
      if (data && data.length > 0) {
        players = data;
        dataLoaded = true;
        statusEl.textContent = '';

        if (year === CURRENT_YEAR) {
          updEl.textContent = formatTime(new Date());
          updEl.style.display = '';
        } else {
          updEl.textContent = '';
          updEl.style.display = 'none';
        }

        const sorted = sortPlayers(players, sortMode);

        if (initial) {
          // First load — just render instantly, then grow in
          renderList(sorted, false);
          const container = document.getElementById('player-list');
          container.style.opacity = '1';
          container.style.transform = 'translateY(0)';
          animateHRGrowIn(sorted);
        } else {
          transitionToYear(sorted);
        }

        // Re-enable polling only for current year
        if (year === CURRENT_YEAR) {
          pollTimer = setInterval(() => refreshCurrentYear(), POLL_MS);
        }
      }
    } catch (e) {
      if (!dataLoaded) statusEl.textContent = 'Could not connect. Retrying…';
    }
  }

  async function refreshCurrentYear() {
    if (selectedYear !== CURRENT_YEAR) return;
    try {
      const data = await fetchData(CURRENT_YEAR);
      if (data && data.length > 0) {
        players = data;
        document.getElementById('last-updated').textContent = formatTime(new Date());
        renderList(sortPlayers(players, sortMode), true);
      }
    } catch (e) {}
  }

  // ── Sort button ──
  document.getElementById('sort-btn').addEventListener('click', () => {
    sortMode = sortMode === 'most' ? 'alpha' : 'most';
    animateSort(sortPlayers(players, sortMode));
  });

  // ── Boot ──
  // Show placeholder immediately
  const container = document.getElementById('player-list');
  container.style.opacity = '0';
  players = PLACEHOLDER;
  renderList(sortPlayers(players, sortMode), true);

  // Load real data with grow-in
  loadYear(CURRENT_YEAR, true);
  // Note: poll timer is started inside loadYear on success
</script>
</body>
